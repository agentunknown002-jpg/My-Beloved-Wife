<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Beloved Wife</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        /* LOGIN SCREEN */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #4a001e, #000000);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; opacity: 1; transition: opacity 1s ease;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px; border-radius: 20px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 105, 180, 0.4);
            text-align: center; color: white;
            box-shadow: 0 0 30px rgba(255, 20, 147, 0.3);
            width: 80%; max-width: 350px;
        }

        input {
            padding: 12px; border-radius: 25px; border: none;
            width: 80%; margin-bottom: 20px; outline: none;
            text-align: center; font-size: 1rem;
            color: #333;
        }

        button {
            background: #ff1493; color: white; border: none;
            padding: 12px 30px; border-radius: 25px;
            cursor: pointer; font-weight: bold; transition: 0.3s;
            font-size: 1rem;
        }

        button:active { transform: scale(0.95); }

        /* MAIN SCENE (Initially Hidden) */
        #main-content {
            display: none; width: 100%; height: 100vh;
            background: radial-gradient(circle, #2b0017, #000);
            position: relative; overflow: hidden;
            transform: scale(0); opacity: 0;
            transition: transform 2.5s ease-out, opacity 2s ease;
        }

        /* This class triggers the Zoom In */
        .zoom-in-effect {
            display: block !important; transform: scale(1) !important; opacity: 1 !important;
        }

        .heart_planet_love {
            font-family: 'Pacifico', cursive;
            font-size: 2.5rem; color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 1), 0 0 30px #ff1493;
            text-align: center; padding-top: 40px;
            letter-spacing: 2px; position: relative; z-index: 100;
        }

        /* THE ORBIT SYSTEM */
        .universe {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
        }

        .center-planet img {
            width: 120px; height: 120px;
            filter: drop-shadow(0 0 25px #ff1493);
            z-index: 50; position: relative;
        }

        .orbit-photo {
            position: absolute; width: 55px; height: 55px;
            border-radius: 8px; border: 1.5px solid white;
            overflow: hidden; box-shadow: 0 0 10px rgba(255,255,255,0.4);
            animation: orbit linear infinite;
        }

        .orbit-photo img { width: 100%; height: 100%; object-fit: cover; }

        @keyframes orbit {
            from { transform: rotate(0deg) translateX(var(--distance)) rotate(0deg); }
            to   { transform: rotate(360deg) translateX(var(--distance)) rotate(-360deg); }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="font-family: 'Pacifico', cursive; margin-top: 0;">Welcome</h2><p style="font-size: 0.9rem; margin-bottom: 20px;">Please enter the name of the most beautiful woman</p>
            <input type="text" id="username" placeholder="Full Name..." autocomplete="off">
            <br>
            <button id="loginBtn" onclick="checkLogin()">Enter Orbit</button>
        </div>
    </div>

    <div id="main-content">
        <h1 class="heart_planet_love">ALEX DEV</h1>
        <div class="universe">
            <div class="center-planet">
                <img src="https://pngimg.com/uploads/heart/heart_PNG51335.png" alt="Heart">
            </div>
            <div id="orbit-garden"></div>
        </div>
    </div>

    <script>
        function checkLogin() {
            const userInp = document.getElementById('username').value.trim();
            const music = document.getElementById('bg-music');
            const mainContent = document.getElementById('main-content');
            const loginScreen = document.getElementById('login-screen');
            
            // Log for debugging (You can see this in Inspect Element)
            console.log("Attempted name: " + userInp);

            if (userInp === "Kyal Sin Ko Ko") {
                // 1. Fade out the login screen
                loginScreen.style.opacity = "0";
                
                // 2. Start Music
                music.play().catch(function(error) {
                    console.log("Music play auto-blocked, but moving forward.");
                });

                // 3. Generate the 172 images
                generateImages(172);
                
                // 4. Show the main scene and trigger the Zoom
                mainContent.style.display = 'block';
                setTimeout(function() {
                    loginScreen.style.display = 'none';
                    mainContent.classList.add('zoom-in-effect');
                }, 1000); 

            } else {
                alert("That's not the correct name! Please check spaces and spelling.");
            }
        }

        function generateImages(count) {
            const garden = document.getElementById('orbit-garden');
            // Clear existing if any
            garden.innerHTML = ''; 

            for (let i = 1; i <= count; i++) {
                const imgDiv = document.createElement('div');
                imgDiv.className = 'orbit-photo';
                
                // Spread images out across the screen
                const distance = Math.floor(Math.random() * 350) + 100; 
                const duration = Math.floor(Math.random() * 25) + 12;   
                const delay = Math.random() * -40;                      
                
                imgDiv.style.setProperty('--distance', distance + 'px');
                imgDiv.style.animationDuration = duration + 's';
                imgDiv.style.animationDelay = delay + 's';
                
                // If images/1.jpg doesn't exist, it shows a pink placeholder
                imgDiv.innerHTML = '<img src="images/' + i + '.jpg" onerror="this.src=\'https://via.placeholder.com/100/ff1493/ffffff?text=Love\'">';
                
                garden.appendChild(imgDiv);
            }
        }
    </script>
</body>
</html>
