<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyal Sin Ko Ko | Universe</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial', sans-serif; }
        
        /* LOGIN GATE */
        #gate { 
            position: fixed; inset: 0; z-index: 100; 
            background: radial-gradient(circle, #2b001a 0%, #000 100%);
            display: flex; justify-content: center; align-items: center; color: white;
            transition: opacity 1s ease;
        }
        .btn { 
            padding: 22px 50px; background: #ff1493; border: none; color: white; 
            font-size: 22px; font-weight: bold; border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 30px #ff1493; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="gate">
        <button class="btn" onclick="init()">ENTER UNIVERSE</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FontLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/geometries/TextGeometry.js"></script>

    <script>
        let scene, camera, renderer, controls;

        function init() {
            document.getElementById('gate').style.opacity = '0';
            setTimeout(() => { document.getElementById('gate').style.display = 'none'; }, 1000);

            // 1. SCENE SETUP
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 20;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Smooth Controls (360 Drag & Zoom)
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.8;

            // 2. THE CORE (Glowing Star)
            const coreGeo = new THREE.SphereGeometry(2.5, 32, 32);
            const coreMat = new THREE.MeshStandardMaterial({ 
                color: 0xff1493, 
                emissive: 0xff69b4, 
                emissiveIntensity: 5 
            });
            const core = new THREE.Mesh(coreGeo, coreMat);
            scene.add(core);

            const pointLight = new THREE.PointLight(0xff69b4, 3, 60);
            scene.add(pointLight);
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));

            // 3. ULTRA PARTICLES (10,000 STARS)
            const starGeo = new THREE.BufferGeometry();
            const starPos = [];
            for(let i=0; i<10000; i++) {
                const x = (Math.random() - 0.5) * 150;
                const y = (Math.random() - 0.5) * 150;
                const z = (Math.random() - 0.5) * 150;
                starPos.push(x, y, z);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
            const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.07, transparent: true, opacity: 0.8 });
            const starCloud = new THREE.Points(starGeo, starMat);
            scene.add(starCloud);

            // 4. FLOATING 3D ENGLISH TEXT
            const fontLoader = new THREE.FontLoader();
            fontLoader.load('https://threejs.org/examples/fonts/helvetiker_bold.typeface.json', (font) => {const words = ["Love You", "Forever", "Always", "My Universe", "Queen"];
                for(let i = 0; i < 40; i++) {
                    const textGeo = new THREE.TextGeometry(words[Math.floor(Math.random() * words.length)], { 
                        font: font, size: 0.5, height: 0.1 
                    });
                    const textMat = new THREE.MeshBasicMaterial({ color: 0xff69b4, transparent: true, opacity: 0.7 });
                    const textMesh = new THREE.Mesh(textGeo, textMat);
                    textMesh.position.set((Math.random()-0.5)*40, (Math.random()-0.5)*30, (Math.random()-0.5)*40);
                    scene.add(textMesh);
                }
            });

            // 5. 172 SPRITE PHOTOS (Always faces your screen)
            const textureLoader = new THREE.TextureLoader();
            for (let i = 1; i <= 172; i++) {
                const tex = textureLoader.load(1 (${i}).jpg);
                const spriteMat = new THREE.SpriteMaterial({ map: tex });
                const sprite = new THREE.Sprite(spriteMat);
                
                // Sphere-shaped distribution
                const phi = Math.acos(-1 + (2 * i) / 172);
                const theta = Math.sqrt(172 * Math.PI) * phi;
                const dist = 10 + Math.random() * 5;

                sprite.position.set(
                    dist * Math.cos(theta) * Math.sin(phi),
                    dist * Math.sin(theta) * Math.sin(phi),
                    dist * Math.cos(phi)
                );
                
                sprite.scale.set(1.8, 1.8, 1); // Size of photos
                scene.add(sprite);
            }

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Required for damping/auto-rotate
            renderer.render(scene, camera);
        }

        // Handle Screen Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
