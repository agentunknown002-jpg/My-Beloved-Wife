<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; color: white; font-family: sans-serif; }
        
        /* LOGIN SCREEN - MATCHES YOUR SCREENSHOT */
        #login-screen {
            position: fixed; inset: 0; background: radial-gradient(circle, #2b001a, #000);
            display: flex; justify-content: center; align-items: center; z-index: 10000;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.07); padding: 35px; border-radius: 25px;
            backdrop-filter: blur(20px); border: 1px solid rgba(255, 105, 180, 0.3);
            text-align: center; width: 280px; box-shadow: 0 0 50px rgba(255, 20, 147, 0.3);
        }
        h1 { font-family: 'Pacifico', cursive; font-size: 2rem; margin: 0 0 10px 0; }
        p { font-size: 0.85rem; opacity: 0.8; margin-bottom: 25px; line-height: 1.4; }
        input { width: 90%; padding: 14px; border-radius: 25px; border: none; margin-bottom: 20px; text-align: center; font-size: 1rem; color: #000; }
        button { width: 100%; padding: 14px; border-radius: 25px; border: none; background: #ff1493; color: white; font-weight: bold; cursor: pointer; font-size: 1.1rem; }

        /* THE GALAXY SCENE */
        #main-view { display: none; width: 100%; height: 100vh; perspective: 1000px; background: #000; }
        #zoom-container { width: 100%; height: 100%; transform-style: preserve-3d; }
        #galaxy-root { position: absolute; top: 50%; left: 50%; transform-style: preserve-3d; }

        /* THE PLANET */
        .planet-core {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 150px; height: 150px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff69b4, #ff1493, #000);
            box-shadow: 0 0 60px #ff1493, inset -20px -20px 50px rgba(0,0,0,0.8);
            z-index: 10; display: flex; justify-content: center; align-items: center;
        }
        .planet-core::after { content: '❤️'; font-size: 4rem; }

        /* PHOTO CARDS */
        .card {
            position: absolute; width: 80px; height: 80px;
            background: #fff; border: 2px solid #fff; border-radius: 5px;
            overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backface-visibility: hidden;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; }

        /* MULTIPLE TEXT LINES */
        .love-text {
            position: absolute; font-family: 'Pacifico', cursive; color: #fff;
            white-space: nowrap; font-size: 1.6rem; pointer-events: none;
            text-shadow: 0 0 15px #ff1493;
        }

        .star-dust { position: absolute; background: #fff; border-radius: 50%; opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1>Welcome</h1>
            <p>Enter the name of the most beautiful woman</p>
            <input type="text" id="name-input" placeholder="Full Name..." autocomplete="off">
            <button onclick="unlockUniverse()">Enter Orbit</button>
        </div>
    </div>

    <div id="main-view">
        <div id="zoom-container">
            <div class="planet-core"></div>
            <div id="galaxy-root"></div>
        </div>
    </div>

    <script>
        let zoom = 1;
        let rX = -10, rY = 0;
        let isDown = false, lastX, lastY, distStart = 0;function unlockUniverse() {
            const name = document.getElementById('name-input').value.trim();
            // Case-sensitive check to match your requirement
            if(name === "Kyal Sin Ko Ko") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-view').style.display = 'block';
                setupGalaxy();
            } else {
                alert("Incorrect Name. Please try again.");
            }
        }

        function setupGalaxy() {
            const root = document.getElementById('galaxy-root');
            
            // 1. Create Star Field
            for(let i=0; i<250; i++) {
                let s = document.createElement('div');
                s.className = 'star-dust';
                let r = 200 + Math.random() * 800;
                let theta = Math.random() * Math.PI * 2;
                let phi = Math.random() * Math.PI;
                let size = (Math.random() * 2 + 1) + 'px';
                s.style.width = size; s.style.height = size;
                s.style.transform = translate3d(${r*Math.sin(phi)*Math.cos(theta)}px, ${r*Math.sin(phi)*Math.sin(theta)}px, ${r*Math.cos(phi)}px);
                root.appendChild(s);
            }

            // 2. Create 172 Images from your root folder
            for (let i = 1; i <= 172; i++) {
                let card = document.createElement('div');
                card.className = 'card';
                let angle = (i / 172) * Math.PI * 2;
                let r = 380 + (Math.random() * 100);
                let x = Math.cos(angle) * r;
                let z = Math.sin(angle) * r;
                let y = (Math.random() - 0.5) * 550;

                card.style.transform = translate3d(${x}px, ${y}px, ${z}px) rotateY(${-angle}rad);
                // Corrected path for your GitHub files
                card.innerHTML = <img src="1 (${i}).jpg" onerror="this.src='https://via.placeholder.com/100/ff1493/ffffff?text=❤️'">;
                root.appendChild(card);
            }

            // 3. Create 12 Text Lines
            for(let t=0; t<12; t++) {
                let txt = document.createElement('div');
                txt.className = 'love-text';
                txt.innerText = "I love Kyal Sin Ko Ko";
                let angle = (t / 12) * Math.PI * 2;
                let r = 500;
                txt.style.transform = translate3d(${Math.cos(angle)*r}px, ${(t-6)*60}px, ${Math.sin(angle)*r}px) rotateY(${-angle}rad);
                root.appendChild(txt);
            }

            initControls();
            loop();
        }

        function initControls() {
            // Mouse/Touch Drag
            const start = (x, y) => { isDown = true; lastX = x; lastY = y; };
            const move = (x, y) => {
                if(!isDown) return;
                rY += (x - lastX) * 0.5;
                rX -= (y - lastY) * 0.5;
                lastX = x; lastY = y;
            };

            window.onmousedown = e => start(e.clientX, e.clientY);
            window.onmousemove = e => move(e.clientX, e.clientY);
            window.onmouseup = () => isDown = false;

            window.ontouchstart = e => {
                if(e.touches.length === 2) {
                    distStart = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                } else {
                    start(e.touches[0].clientX, e.touches[0].clientY);
                }
            };
            window.ontouchmove = e => {
                if(e.touches.length === 2) {
                    let d = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                    zoom *= (d / distStart);
                    zoom = Math.max(0.3, Math.min(zoom, 3));
                    distStart = d;
                } else {
                    move(e.touches[0].clientX, e.touches[0].clientY);
                }
            };
            window.ontouchend = () => isDown = false;
        }function loop() {
            if(!isDown) rY += 0.1; // Slow drift
            document.getElementById('galaxy-root').style.transform = rotateX(${rX}deg) rotateY(${rY}deg);
            document.getElementById('zoom-container').style.transform = scale(${zoom});
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
