<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universe</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        /* THE BUTTON SCREEN */
        #gate { 
            position: fixed; inset: 0; background: #000; 
            display: flex; justify-content: center; align-items: center; z-index: 99999; 
        }
        
        /* VERY SIMPLE BUTTON - NO FANCY CSS */
        #start-btn { 
            background: #ff1493; color: white; border: none; 
            padding: 25px 50px; border-radius: 50px; 
            font-size: 20px; font-weight: bold; 
            box-shadow: 0 0 30px #ff1493;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        /* THE UNIVERSE (HIDDEN AT START) */
        #universe { display: none; width: 100%; height: 100vh; perspective: 1000px; }
        #scene { position: absolute; top: 50%; left: 50%; transform-style: preserve-3d; }

        .planet {
            position: absolute; width: 150px; height: 150px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff85c1, #ff1493, #000);
            transform: translate(-50%, -50%); box-shadow: 0 0 80px #ff1493;
            display: flex; justify-content: center; align-items: center;
        }
        .planet::after { content: '❤️'; font-size: 4rem; }

        .card { position: absolute; width: 80px; height: 80px; background: #fff; border-radius: 4px; opacity: 0; transition: opacity 0.5s; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="gate">
        <button id="start-btn" onclick="go()" ontouchstart="go()">ENTER ORBIT</button>
    </div>

    <div id="universe">
        <div id="scene">
            <div class="planet"></div>
        </div>
    </div>

    <script>
        var activated = false;

        function go() {
            if (activated) return; // Prevent double clicks
            activated = true;

            // 1. Force Hide / Force Show
            document.getElementById('gate').setAttribute('style', 'display:none !important');
            document.getElementById('universe').style.display = 'block';
            
            startAnimation();
        }

        var ry = 0;
        function startAnimation() {
            var scene = document.getElementById('scene');

            // Stars
            for(var i=0; i<150; i++) {
                var s = document.createElement('div');
                s.className = 'star';
                var r = 200 + Math.random()*800;
                var p = Math.random()*Math.PI*2, t = Math.random()*Math.PI;
                s.style.width = s.style.height = '2px';
                s.style.transform = "translate3d(" + (r*Math.sin(t)*Math.cos(p)) + "px, " + (r*Math.sin(t)*Math.sin(p)) + "px, " + (r*Math.cos(t)) + "px)";
                scene.appendChild(s);
            }

            // Photos - Slow staggered loading to keep it from crashing
            var count = 1;
            function loadNext() {
                if (count > 172) return;
                var c = document.createElement('div');
                c.className = 'card';
                var a = (count / 172) * Math.PI * 2;
                var r = 400;
                var y = (Math.random() - 0.5) * 600;
                c.style.transform = "translate3d(" + (Math.cos(a)*r) + "px," + y + "px," + (Math.sin(a)*r) + "px) rotateY(" + (-a) + "rad)";
                c.innerHTML = '<img src="1 (' + count + ').jpg" onerror="this.parentElement.remove()">';scene.appendChild(c);
                setTimeout(function() { c.style.opacity = 1; }, 50);
                count++;
                setTimeout(loadNext, 40);
            }
            loadNext();
            
            tick();
        }

        function tick() {
            ry += 0.15;
            document.getElementById('scene').style.transform = "rotateY(" + ry + "deg) rotateX(-10deg)";
            requestAnimationFrame(tick);
        }
    </script>
</body>
</html>
