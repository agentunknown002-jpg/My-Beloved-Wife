<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kyal Sin Ko Ko Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        
        /* THE ENTRANCE */
        #gate {
            position: fixed; inset: 0; background: radial-gradient(circle at center, #2b001a 0%, #000 100%);
            display: flex; justify-content: center; align-items: center; z-index: 10000;
        }
        .login-box { text-align: center; width: 280px; padding: 40px; background: rgba(255,255,255,0.05); border-radius: 30px; backdrop-filter: blur(10px); border: 1px solid rgba(255,20,147,0.3); }
        h1 { font-family: 'Pacifico', cursive; color: #ff69b4; margin-bottom: 30px; font-size: 2.2rem; }
        
        #start-btn { 
            background: #ff1493; color: white; border: none; padding: 18px; width: 100%;
            border-radius: 50px; font-size: 1.2rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 20, 147, 0.3);
        }

        /* THE UNIVERSE */
        #universe { display: none; width: 100%; height: 100vh; perspective: 1000px; touch-action: none; }
        #scene { position: absolute; top: 50%; left: 50%; transform-style: preserve-3d; transition: transform 0.1s ease-out; }

        /* THE PREMIUM PLANET */
        .planet {
            position: absolute; width: 150px; height: 150px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff85c1 0%, #ff1493 50%, #33001a 100%);
            transform: translate(-50%, -50%);
            box-shadow: 0 0 80px rgba(255, 20, 147, 0.6), inset -15px -15px 40px rgba(0,0,0,0.8);
            display: flex; justify-content: center; align-items: center; z-index: 10;
        }
        .planet::after { content: '❤️'; font-size: 4rem; filter: drop-shadow(0 0 10px white); }

        /* PHOTO CARDS */
        .card { 
            position: absolute; width: 80px; height: 80px; background: #fff; 
            padding: 3px; border-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            backface-visibility: hidden; opacity: 0; transition: opacity 1s;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; border-radius: 2px; }

        .star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.5; }
        .love-text { position: absolute; font-family: 'Pacifico', cursive; color: #fff; font-size: 1.5rem; text-shadow: 0 0 10px #ff1493; white-space: nowrap; }
    </style>
</head>
<body>

    <div id="gate">
        <div class="login-box">
            <h1>Universe</h1>
            <button id="start-btn" onclick="init()">ENTER ORBIT</button>
        </div>
    </div>

    <div id="universe">
        <div id="scene">
            <div class="planet"></div>
        </div>
    </div>

    <script>
        let ry = 0;
        let rx = -10;
        let isDragging = false;
        let lastX, lastY;

        function init() {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('universe').style.display = 'block';
            
            const scene = document.getElementById('scene');

            // 1. Stars
            for(let i=0; i<150; i++) {
                let s = document.createElement('div');
                s.className = 'star';
                let r = 200 + Math.random()*800;
                let p = Math.random()*Math.PI*2, t = Math.random()*Math.PI;
                s.style.width = s.style.height = '2px';
                s.style.transform = translate3d(${r*Math.sin(t)*Math.cos(p)}px, ${r*Math.sin(t)*Math.sin(p)}px, ${r*Math.cos(t)}px);
                scene.appendChild(s);
            }// 2. Slow-Spawn Photos
            let imgIndex = 1;
            function spawnPhoto() {
                if(imgIndex > 172) return;
                let c = document.createElement('div');
                c.className = 'card';
                let a = (imgIndex / 172) * Math.PI * 2;
                let r = 350 + (Math.random() * 150);
                let y = (Math.random() - 0.5) * 600;
                c.style.transform = translate3d(${Math.cos(a)*r}px, ${y}px, ${Math.sin(a)*r}px) rotateY(${-a}rad);
                c.innerHTML = <img src="1 (${imgIndex}).jpg" onerror="this.parentElement.remove()">;
                scene.appendChild(c);
                setTimeout(() => { c.style.opacity = "1"; }, 100);
                imgIndex++;
                setTimeout(spawnPhoto, 50); 
            }
            spawnPhoto();

            // 3. Controls
            window.ontouchstart = (e) => { isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; };
            window.ontouchmove = (e) => {
                if (!isDragging) return;
                let dx = e.touches[0].clientX - lastX;
                let dy = e.touches[0].clientY - lastY;
                ry += dx * 0.3;
                rx -= dy * 0.3;
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
            };
            window.ontouchend = () => { isDragging = false; };

            loop();
        }

        function loop() {
            if(!isDragging) ry += 0.15;
            document.getElementById('scene').style.transform = rotateX(${rx}deg) rotateY(${ry}deg);
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
