<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        
        #gate { position: fixed; inset: 0; background: radial-gradient(circle, #2b001a, #000); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-box { text-align: center; width: 280px; padding: 30px; background: rgba(255,255,255,0.05); border-radius: 30px; backdrop-filter: blur(10px); border: 1px solid rgba(255,20,147,0.3); }
        h1 { font-family: 'Pacifico', cursive; color: #ff69b4; font-size: 2rem; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; border-radius: 25px; border: 1px solid #ff1493; background: #000; color: #fff; text-align: center; margin-bottom: 20px; outline: none; box-sizing: border-box; }
        #start-btn { background: #ff1493; color: white; border: none; padding: 18px; width: 100%; border-radius: 50px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }

        #universe { display: none; width: 100%; height: 100vh; perspective: 1000px; background: radial-gradient(circle at center, #1a000d 0%, #000 100%); }
        #scene { position: absolute; top: 50%; left: 50%; transform-style: preserve-3d; }

        /* THE PLANET */
        .planet {
            position: absolute; width: 160px; height: 160px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff85c1, #ff1493, #000);
            transform: translate(-50%, -50%); box-shadow: 0 0 100px #ff1493;
            display: flex; justify-content: center; align-items: center; z-index: 100;
        }
        .planet::after { content: '❤️'; font-size: 4rem; filter: drop-shadow(0 0 10px white); }

        /* THE PHOTOS */
        .card { 
            position: absolute; width: 100px; height: 100px; background: #fff; 
            padding: 4px; border-radius: 5px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            opacity: 0; transition: opacity 1s; transform-style: preserve-3d;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; border-radius: 2px; }

        .star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>

    <div id="gate">
        <div class="login-box">
            <h1>Universe</h1>
            <input type="text" id="nameInput" placeholder="Enter Name">
            <button id="start-btn" onclick="checkName()">ENTER ORBIT</button>
        </div>
    </div>

    <div id="universe">
        <div id="scene">
            <div class="planet"></div>
        </div>
    </div>

    <script>
        function checkName() {
            const name = document.getElementById('nameInput').value.trim().toLowerCase();
            if (name.replace(/\s/g, "") === "kyalsinkoko") {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('universe').style.display = 'block';
                startGalaxy();
            } else { alert("Incorrect Name."); }
        }

        let ry = 0;
        function startGalaxy() {
            const sc = document.getElementById('scene');

            // 1. Generate Stars (Instantly fills the space)
            for(let i=0; i<300; i++) {
                let s = document.createElement('div');
                s.className = 'star';
                let r = 200 + Math.random()*1000;
                let p = Math.random()*Math.PI*2, t = Math.random()*Math.PI;
                s.style.width = s.style.height = (Math.random()*2+1)+'px';
                s.style.transform = translate3d(${r*Math.sin(t)*Math.cos(p)}px, ${r*Math.sin(t)*Math.sin(p)}px, ${r*Math.cos(t)}px);
                sc.appendChild(s);
            }// 2. Generate Photos
            let idx = 1;
            function addOne() {
                if(idx > 172) return;
                let c = document.createElement('div');
                c.className = 'card';
                let a = (idx/172)*Math.PI*2;
                let r = 450 + (Math.random()*100); // Orbit radius
                let y = (Math.random()-0.5)*700;
                
                c.style.transform = translate3d(${Math.cos(a)*r}px, ${y}px, ${Math.sin(a)*r}px) rotateY(${-a}rad);
                
                // This tries 1 (1).jpg. If it fails, it tries 1(1).jpg (no space)
                let imgPath = 1 (${idx}).jpg;
                c.innerHTML = <img src="${imgPath}" onerror="this.src='1(${idx}).jpg'; this.onerror=function(){this.parentElement.remove();}">;
                
                sc.appendChild(c);
                setTimeout(() => c.style.opacity = 1, 100);
                idx++;
                setTimeout(addOne, 40); 
            }
            addOne();
            loop();
        }

        function loop() {
            ry += 0.15;
            document.getElementById('scene').style.transform = rotateY(${ry}deg) rotateX(-10deg);
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
