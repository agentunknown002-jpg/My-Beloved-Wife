<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Kyal Sin Ko Ko</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        
        /* ENTRANCE SCREEN */
        #gate {
            position: fixed; inset: 0; background: radial-gradient(circle at center, #1a000d, #000);
            display: flex; justify-content: center; align-items: center; z-index: 10000; transition: opacity 0.8s ease;
        }
        .box { text-align: center; width: 280px; padding: 40px; background: rgba(255,255,255,0.03); border-radius: 40px; backdrop-filter: blur(15px); border: 1px solid rgba(255,20,147,0.3); }
        h1 { font-family: 'Pacifico', cursive; color: #ff69b4; margin-bottom: 30px; font-size: 2.2rem; text-shadow: 0 0 15px rgba(255,20,147,0.5); }
        
        #start-btn { 
            background: linear-gradient(45deg, #ff1493, #ff69b4); color: white; border: none; padding: 20px; width: 100%;
            border-radius: 50px; font-size: 1.2rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 20, 147, 0.4);
        }

        /* UNIVERSE SETUP */
        #universe { display: none; width: 100%; height: 100vh; perspective: 1200px; background: #000; }
        #scene { position: absolute; top: 50%; left: 50%; transform-style: preserve-3d; }

        /* THE GLOWING PLANET */
        .planet {
            position: absolute; width: 160px; height: 160px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff85c1, #ff1493, #33001a);
            transform: translate(-50%, -50%);
            box-shadow: 0 0 80px rgba(255, 20, 147, 0.7), inset -15px -15px 50px rgba(0,0,0,0.9);
            display: flex; justify-content: center; align-items: center; z-index: 10;
        }
        .planet::after { content: '❤️'; font-size: 4rem; filter: drop-shadow(0 0 10px white); }

        /* PHOTO CARDS */
        .card { 
            position: absolute; width: 85px; height: 85px; background: #fff; 
            padding: 4px; border-radius: 4px; box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            backface-visibility: hidden; opacity: 0; transition: opacity 1s;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; border-radius: 2px; }

        .star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.4; pointer-events: none; }
        .love-text { position: absolute; font-family: 'Pacifico', cursive; color: #fff; font-size: 1.6rem; text-shadow: 0 0 15px #ff1493; white-space: nowrap; pointer-events: none; }
    </style>
</head>
<body>

    <div id="gate">
        <div class="box">
            <h1>Universe</h1>
            <button id="start-btn" onclick="launch()">ENTER ORBIT</button>
        </div>
    </div>

    <div id="universe">
        <div id="scene">
            <div class="planet"></div>
        </div>
    </div>

    <script>
        let ry = 0;

        function launch() {
            // Hide the button screen
            document.getElementById('gate').style.display = 'none';
            document.getElementById('universe').style.display = 'block';
            
            const scene = document.getElementById('scene');

            // 1. Add Stars
            for(let i=0; i<200; i++) {
                let s = document.createElement('div');
                s.className = 'star';
                let r = 250 + Math.random()*1000;
                let p = Math.random()*Math.PI*2, t = Math.random()*Math.PI;
                s.style.width = s.style.height = (Math.random()*2+1)+'px';
                s.style.transform = translate3d(${r*Math.sin(t)*Math.cos(p)}px, ${r*Math.sin(t)*Math.sin(p)}px, ${r*Math.cos(t)}px);
                scene.appendChild(s);
            }// 2. Add Love Text
            for(let j=0; j<8; j++){
                let t = document.createElement('div');
                t.className = 'love-text';
                t.innerText = "I love Kyal Sin Ko Ko";
                let a = (j/8)*Math.PI*2;
                t.style.transform = translate3d(${Math.cos(a)*550}px, ${(j-4)*80}px, ${Math.sin(a)*550}px) rotateY(${-a}rad);
                scene.appendChild(t);
            }

            // 3. Staggered Photo Loading
            let count = 1;
            function addPhoto() {
                if(count > 172) return;
                let c = document.createElement('div');
                c.className = 'card';
                let a = (count / 172) * Math.PI * 2;
                let r = 400 + (Math.random() * 100);
                let y = (Math.random() - 0.5) * 700;
                
                c.style.transform = translate3d(${Math.cos(a)*r}px, ${y}px, ${Math.sin(a)*r}px) rotateY(${-a}rad);
                
                // Checks for both filename types
                let img = document.createElement('img');
                img.src = 1 (${count}).jpg;
                img.onerror = function() { this.src = 1(${count}).jpg; this.onerror = function() { this.parentElement.remove(); } };
                
                c.appendChild(img);
                scene.appendChild(c);
                setTimeout(() => c.style.opacity = 1, 50);
                
                count++;
                setTimeout(addPhoto, 35);
            }
            addPhoto();
            animate();
        }

        function animate() {
            ry += 0.15;
            document.getElementById('scene').style.transform = rotateY(${ry}deg) rotateX(-10deg);
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
