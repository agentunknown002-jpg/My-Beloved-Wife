<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universe | Kyal Sin Ko Ko</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
        
        #universe { width: 100%; height: 100vh; perspective: 1200px; background: #000; }
        #scene { position: absolute; top: 50%; left: 50%; transform-style: preserve-3d; }

        /* THE HEART CORE */
        .planet {
            position: absolute; width: 140px; height: 140px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff85c1, #ff1493, #000);
            transform: translate(-50%, -50%); box-shadow: 0 0 80px #ff1493;
            display: flex; justify-content: center; align-items: center; z-index: 10;
        }
        .planet::after { content: '❤️'; font-size: 3.5rem; }

        /* PHOTO CARDS - Always Facing Forward */
        .card { position: absolute; width: 85px; height: 85px; background: #fff; padding: 3px; border-radius: 4px; transform-style: preserve-3d; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .card img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        
        .star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.7; pointer-events: none; }
        .love-text { position: absolute; color: #ff69b4; font-weight: bold; font-size: 1.3rem; white-space: nowrap; pointer-events: none; text-shadow: 0 0 10px #000; }
    </style>
</head>
<body onload="init()">

    <div id="universe">
        <div id="scene">
            <div class="planet"></div>
        </div>
    </div>

    <script>
        let ry = 0, rx = -10, isDragging = false, lastX, lastY;

        function init() {
            const scene = document.getElementById('scene');
            
            // 1. Add 800 Stars (Particles)
            for(let i=0; i<800; i++) {
                let s = document.createElement('div');
                s.className = 'star';
                let r = 200 + Math.random() * 1200;
                let phi = Math.random() * Math.PI * 2;
                let theta = Math.random() * Math.PI;
                s.style.width = s.style.height = (Math.random()*3)+'px';
                s.dataset.x = r * Math.sin(theta) * Math.cos(phi);
                s.dataset.y = r * Math.sin(theta) * Math.sin(phi);
                s.dataset.z = r * Math.cos(theta);
                scene.appendChild(s);
            }

            // 2. Add 172 Billboard Photos (Facing Front)
            for(let i=1; i<=172; i++) {
                let c = document.createElement('div');
                c.className = 'card';
                let phi = Math.acos(-1 + (2 * i) / 172);
                let theta = Math.sqrt(172 * Math.PI) * phi;
                let r = 450;
                
                c.dataset.x = r * Math.sin(phi) * Math.cos(theta);
                c.dataset.y = r * Math.sin(phi) * Math.sin(theta);
                c.dataset.z = r * Math.cos(phi);
                
                // Trying both filename formats automatically
                c.innerHTML = <img src="1 (${i}).jpg" onerror="this.src='1(${i}).jpg'; this.onerror=function(){this.parentElement.remove();}">;
                scene.appendChild(c);
            }

            // 3. Add Love Text
            const words = ["Love You", "Forever", "Always", "Queen"];
            for(let i=0; i<15; i++) {
                let t = document.createElement('div');
                t.className = 'love-text';
                t.innerText = words[i % words.length];
                let r = 650;
                let a = (i/15) * Math.PI * 2;
                t.dataset.x = Math.cos(a) * r;
                t.dataset.y = (Math.random() - 0.5) * 600;
                t.dataset.z = Math.sin(a) * r;
                scene.appendChild(t);
            }

            animate();
        }// --- Drag Controls ---
        window.addEventListener('touchstart', e => { isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; });
        window.addEventListener('touchmove', e => {
            if(!isDragging) return;
            ry += (e.touches[0].clientX - lastX) * 0.3;
            rx -= (e.touches[0].clientY - lastY) * 0.3;
            lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
        });
        window.addEventListener('touchend', () => isDragging = false);

        function animate() {
            if(!isDragging) ry += 0.12; // Slow rotate
            
            document.getElementById('scene').style.transform = rotateX(${rx}deg) rotateY(${ry}deg);
            
            // BILLBOARDING ENGINE: This makes everything face her screen
            const items = document.querySelectorAll('.card, .love-text, .star');
            items.forEach(item => {
                let x = item.dataset.x, y = item.dataset.y, z = item.dataset.z;
                item.style.transform = translate3d(${x}px, ${y}px, ${z}px) rotateY(${-ry}deg) rotateX(${-rx}deg);
            });

            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
