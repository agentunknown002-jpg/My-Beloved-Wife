<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kyal Sin Ko Ko Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; }
        
        #login-screen {
            position: fixed; inset: 0; background: radial-gradient(circle, #1a0033, #000);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 30px;
            backdrop-filter: blur(20px); border: 1px solid rgba(138, 43, 226, 0.3);
            text-align: center; color: white; width: 85%; max-width: 320px;
        }
        input { width: 90%; padding: 12px; border-radius: 25px; border: none; margin-bottom: 20px; text-align: center; background: rgba(255,255,255,0.9); }
        button { width: 100%; padding: 12px; border-radius: 25px; border: none; background: #8a2be2; color: white; font-weight: bold; cursor: pointer; }

        #main-content { display: none; width: 100%; height: 100vh; perspective: 1500px; background: radial-gradient(circle at center, #0a001a 0%, #000 100%); }

        /* THE PLANET CORE */
        .planet-core {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 150px; height: 150px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff00ff, #8a2be2, #000);
            box-shadow: 0 0 60px rgba(138, 43, 226, 0.8), inset -20px -20px 50px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* CONTAINER THAT YOU ROTATE */
        #scene-root {
            position: absolute; top: 50%; left: 50%; transform-style: preserve-3d;
            width: 0; height: 0; pointer-events: none;
        }

        .photo-card {
            position: absolute; width: 70px; height: 70px;
            background: #fff; border: 2px solid #fff; border-radius: 10px;
            overflow: hidden; box-shadow: 0 0 15px rgba(255,255,255,0.2);
            backface-visibility: hidden;
        }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; }

        .orbit-text {
            position: absolute; color: #fff; font-family: 'Pacifico', cursive;
            font-size: 1.8rem; white-space: nowrap; pointer-events: none;
            text-shadow: 0 0 15px #8a2be2; backface-visibility: visible;
        }

        .star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="font-family: 'Pacifico';">Enter Universe</h2>
            <input type="text" id="username" placeholder="Full Name..." autocomplete="off">
            <button id="enter-btn">Unlock Orbit</button>
        </div>
    </div>

    <div id="main-content">
        <div id="star-field"></div>
        <div class="planet-core"></div>
        <div id="scene-root"></div>
    </div>

    <script>
        let rotationY = 0;
        let rotationX = -10;
        let isDragging = false;
        let lastX, lastY;

        document.getElementById('enter-btn').addEventListener('click', () => {
            if(document.getElementById('username').value.trim() === "Kyal Sin Ko Ko") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                initUniverse();
            } else {
                alert("Incorrect Access Name");
            }
        });function initUniverse() {
            const root = document.getElementById('scene-root');
            
            // 1. Create 172 Images in a Spherical Shell
            for (let i = 1; i <= 172; i++) {
                const card = document.createElement('div');
                card.className = 'photo-card';
                
                const phi = Math.acos(-1 + (2 * i) / 172);
                const theta = Math.sqrt(172 * Math.PI) * phi;
                const radius = 350 + (Math.random() * 50);

                const x = radius * Math.sin(phi) * Math.cos(theta);
                const y = radius * Math.sin(phi) * Math.sin(theta);
                const z = radius * Math.cos(phi);

                card.style.transform = translate3d(${x}px, ${y}px, ${z}px);
                card.innerHTML = <img src="images/1 (${i}).jpg" onerror="this.src='https://via.placeholder.com/100/8a2be2/ffffff?text=Image+${i}'">;
                root.appendChild(card);
            }

            // 2. Create Multiple "I love Kyal Sin Ko Ko" Texts
            const textLines = 8; 
            for (let j = 0; j < textLines; j++) {
                const text = document.createElement('div');
                text.className = 'orbit-text';
                text.innerText = "I love Kyal Sin Ko Ko";
                
                const angle = (j / textLines) * Math.PI * 2;
                const x = Math.cos(angle) * 500;
                const z = Math.sin(angle) * 500;
                const y = (j - 4) * 80;

                text.style.transform = translate3d(${x}px, ${y}px, ${z}px) rotateY(${-angle}rad);
                root.appendChild(text);
            }

            createStars();
            addInteractions();
            animate();
        }

        function createStars() {
            const field = document.getElementById('star-field');
            for (let i = 0; i < 200; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                s.style.width = Math.random() * 3 + 'px';
                s.style.height = s.style.width;
                s.style.top = Math.random() * 100 + 'vh';
                s.style.left = Math.random() * 100 + 'vw';
                field.appendChild(s);
            }
        }

        // 360 HAND ROTATION LOGIC
        function addInteractions() {
            window.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
            window.addEventListener('touchstart', e => { isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; });
            
            window.addEventListener('mousemove', e => {
                if (!isDragging) return;
                rotationY += (e.clientX - lastX) * 0.3;
                rotationX -= (e.clientY - lastY) * 0.3;
                lastX = e.clientX; lastY = e.clientY;
            });

            window.addEventListener('touchmove', e => {
                if (!isDragging) return;
                rotationY += (e.touches[0].clientX - lastX) * 0.5;
                rotationX -= (e.touches[0].clientY - lastY) * 0.5;
                lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
            });

            window.addEventListener('mouseup', () => isDragging = false);
            window.addEventListener('touchend', () => isDragging = false);
        }

        function animate() {
            // Constant drift + manual rotation
            if (!isDragging) rotationY += 0.1; 
            document.getElementById('scene-root').style.transform = rotateX(${rotationX}deg) rotateY(${rotationY}deg);
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
