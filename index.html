<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universe for Kyal Sin Ko Ko</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; color: white; font-family: sans-serif; }
        
        /* LOGIN SCREEN - EXACT STYLE FROM YOUR SCREENSHOT */
        #login-screen {
            position: fixed; inset: 0; background: radial-gradient(circle, #2b001a, #000);
            display: flex; justify-content: center; align-items: center; z-index: 10000;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.07); padding: 35px; border-radius: 25px;
            backdrop-filter: blur(20px); border: 1px solid rgba(255, 105, 180, 0.3);
            text-align: center; width: 280px; box-shadow: 0 0 50px rgba(255, 20, 147, 0.3);
        }
        h1 { font-family: 'Pacifico', cursive; font-size: 2rem; margin: 0 0 10px 0; }
        p { font-size: 0.85rem; opacity: 0.8; margin-bottom: 25px; }
        input { width: 90%; padding: 14px; border-radius: 25px; border: none; margin-bottom: 20px; text-align: center; font-size: 1rem; color: #000; outline: none; }
        button { width: 100%; padding: 14px; border-radius: 25px; border: none; background: #ff1493; color: white; font-weight: bold; cursor: pointer; font-size: 1.1rem; }

        /* THE GALAXY VIEW */
        #universe-container { display: none; width: 100%; height: 100vh; perspective: 1000px; background: #000; }
        #scaler { width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.1s ease-out; }
        #scene { position: absolute; top: 50%; left: 50%; transform-style: preserve-3d; }

        /* PRETTY HEART PLANET */
        .planet {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 150px; height: 150px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff69b4, #ff1493, #000);
            box-shadow: 0 0 60px #ff1493, inset -20px -20px 50px rgba(0,0,0,0.8);
            display: flex; justify-content: center; align-items: center; z-index: 10;
        }
        .planet::after { content: '❤️'; font-size: 4rem; }

        /* PHOTO CARDS */
        .card {
            position: absolute; width: 80px; height: 80px;
            background: #fff; border: 2px solid #fff; border-radius: 5px;
            overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backface-visibility: hidden;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; }

        /* FLOATING TEXT */
        .love-msg {
            position: absolute; font-family: 'Pacifico', cursive; color: #fff;
            white-space: nowrap; font-size: 1.6rem; pointer-events: none;
            text-shadow: 0 0 15px #ff1493;
        }

        .star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1>Welcome</h1>
            <p>Enter the name of the most beautiful woman</p>
            <input type="text" id="nameInput" placeholder="Full Name..." autocomplete="off">
            <button id="btn" onclick="openUniverse()">Enter Orbit</button>
        </div>
    </div>

    <div id="universe-container">
        <div id="scaler">
            <div id="scene">
                <div class="planet"></div>
                </div>
        </div>
    </div>

    <script>
        let zoomLevel = 1;
        let rotX = -10, rotY = 0;
        let dragging = false, lastX, lastY, pinchStart = 0;function openUniverse() {
            const inputVal = document.getElementById('nameInput').value.trim();
            // Matching the exact name requirement
            if (inputVal === "Kyal Sin Ko Ko") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('universe-container').style.display = 'block';
                buildGalaxy();
            } else {
                alert("Incorrect name. Please try again.");
            }
        }

        function buildGalaxy() {
            const scene = document.getElementById('scene');
            
            // 1. Star Dust Particles
            for (let i = 0; i < 300; i++) {
                let s = document.createElement('div');
                s.className = 'star';
                let r = 200 + Math.random() * 800;
                let theta = Math.random() * Math.PI * 2;
                let phi = Math.random() * Math.PI;
                let sz = (Math.random() * 2 + 1) + 'px';
                s.style.width = sz; s.style.height = sz;
                s.style.transform = translate3d(${r*Math.sin(phi)*Math.cos(theta)}px, ${r*Math.sin(phi)*Math.sin(theta)}px, ${r*Math.cos(phi)}px);
                scene.appendChild(s);
            }

            // 2. 172 Images from your main GitHub folder
            for (let i = 1; i <= 172; i++) {
                let card = document.createElement('div');
                card.className = 'card';
                let angle = (i / 172) * Math.PI * 2;
                let r = 400 + (Math.random() * 100);
                let x = Math.cos(angle) * r;
                let z = Math.sin(angle) * r;
                let y = (Math.random() - 0.5) * 600;

                card.style.transform = translate3d(${x}px, ${y}px, ${z}px) rotateY(${-angle}rad);
                // Fixed path for 1 (1).jpg etc.
                card.innerHTML = <img src="1 (${i}).jpg" onerror="this.src='https://via.placeholder.com/100/ff1493/ffffff?text=❤️'">;
                scene.appendChild(card);
            }

            // 3. Multiple Text Lines
            for (let j = 0; j < 15; j++) {
                let t = document.createElement('div');
                t.className = 'love-msg';
                t.innerText = "I love Kyal Sin Ko Ko";
                let angle = (j / 15) * Math.PI * 2;
                let r = 550;
                t.style.transform = translate3d(${Math.cos(angle)*r}px, ${(j-7.5)*60}px, ${Math.sin(angle)*r}px) rotateY(${-angle}rad);
                scene.appendChild(t);
            }

            initControls();
            loop();
        }

        function initControls() {
            const start = (x, y) => { dragging = true; lastX = x; lastY = y; };
            const move = (x, y) => {
                if (!dragging) return;
                rotY += (x - lastX) * 0.5;
                rotX -= (y - lastY) * 0.5;
                lastX = x; lastY = y;
            };

            window.onmousedown = e => start(e.clientX, e.clientY);
            window.onmousemove = e => move(e.clientX, e.clientY);
            window.onmouseup = () => dragging = false;

            window.ontouchstart = e => {
                if (e.touches.length === 2) {
                    pinchStart = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                } else {
                    start(e.touches[0].clientX, e.touches[0].clientY);
                }
            };
            window.ontouchmove = e => {
                if (e.touches.length === 2) {
                    let d = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                    zoomLevel *= (d / pinchStart);
                    zoomLevel = Math.max(0.2, Math.min(zoomLevel, 3));
                    pinchStart = d;
                } else {
                    move(e.touches[0].clientX, e.touches[0].clientY);
                }
            };
            window.ontouchend = () => dragging = false;window.onwheel = e => {
                zoomLevel -= e.deltaY * 0.001;
                zoomLevel = Math.max(0.2, Math.min(zoomLevel, 3));
            };
        }

        function loop() {
            if (!dragging) rotY += 0.1; // Slow automatic rotation
            document.getElementById('scene').style.transform = rotateX(${rotX}deg) rotateY(${rotY}deg);
            document.getElementById('scaler').style.transform = scale(${zoomLevel});
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
