<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universe for Kyal Sin Ko Ko</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        /* --- LOGIN SCREEN --- */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #3d0018, #000);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; opacity: 1; transition: opacity 1.5s ease;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px; border-radius: 20px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 105, 180, 0.4);
            text-align: center; color: white;
            box-shadow: 0 0 30px rgba(255, 20, 147, 0.5);
            width: 80%; max-width: 320px;
        }

        input {
            padding: 12px; border-radius: 25px; border: none;
            width: 90%; margin-bottom: 25px; text-align: center;
            outline: none; font-size: 1rem; color: #000;
        }

        button {
            background: #ff1493; color: white; border: none;
            padding: 12px 35px; border-radius: 25px;
            cursor: pointer; font-weight: bold; font-size: 1rem;
            transition: 0.3s; width: 100%;
        }

        /* --- MAIN SCENE --- */
        #main-content {
            display: none; width: 100%; height: 100vh;
            background: radial-gradient(circle at center, #1a000d 0%, #000 100%);
            perspective: 2000px;
            opacity: 0; transform: scale(0.2);
            transition: transform 3.5s cubic-bezier(0.1, 0.5, 0.2, 1), opacity 2.5s ease;
        }

        .zoom-active { display: block !important; opacity: 1 !important; transform: scale(1) !important; }

        .bg-star {
            position: absolute; background: white; border-radius: 50%;
            opacity: 0.5; animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        .heart-center {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 140px; z-index: 100;
            filter: drop-shadow(0 0 25px #ff1493);
        }

        .orbit-wrap {
            position: absolute; top: 50%; left: 50%;
            transform-style: preserve-3d;
            animation: rotate360 30s linear infinite;
        }

        @keyframes rotate360 {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        .photo-card {
            position: absolute; width: 60px; height: 60px;
            background: #fff; border: 1px solid #fff;
            border-radius: 5px; overflow: hidden;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
        }

        .photo-card img { width: 100%; height: 100%; object-fit: cover; }

        .orbit-text-wrap {
            position: absolute; transform-style: preserve-3d;
            animation: rotate360 20s linear infinite;
        }

        .orbit-word {
            position: absolute; color: #fff; font-family: 'Pacifico', cursive;
            font-size: 2rem; white-space: nowrap;
            text-shadow: 0 0 15px #ff1493, 0 0 30px #ff1493;
            backface-visibility: visible;
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio><div id="login-screen">
        <div class="login-box">
            <h2 style="margin-top:0; font-family: 'Pacifico', cursive;">Welcome</h2>
            <p>Please enter your access name</p>
            <input type="text" id="username" placeholder="Name..." autocomplete="off">
            <br>
            <button id="enter-btn">Enter Orbit</button>
        </div>
    </div>

    <div id="main-content">
        <div id="bg-star-field"></div>
        <img class="heart-center" src="https://pngimg.com/uploads/heart/heart_PNG51335.png" alt="Heart">
        <div class="orbit-wrap" id="image-garden"></div>
        <div id="orbit-elements"></div>
    </div>

    <script>
        // Use a direct event listener to ensure the button is "alive"
        document.getElementById('enter-btn').addEventListener('click', function() {
            const userInp = document.getElementById('username').value.trim();
            
            // EXACT Match
            if (userInp === "Kyal Sin Ko Ko") {
                startExperience();
            } else {
                alert("Incorrect Name. Please check spelling.");
            }
        });

        function startExperience() {
            const login = document.getElementById('login-screen');
            const main = document.getElementById('main-content');
            const music = document.getElementById('bg-music');

            // 1. Hide Login
            login.style.opacity = "0";
            setTimeout(() => { login.style.display = 'none'; }, 1500);

            // 2. Play Music
            music.play().catch(() => console.log("Music play blocked by browser."));

            // 3. Initialize Elements
            createBGStars();
            spawn172Images();
            createOrbitingText();

            // 4. Show Main Scene
            main.style.display = 'block';
            setTimeout(() => {
                main.classList.add('zoom-active');
            }, 100);
        }

        function createBGStars() {
            const field = document.getElementById('bg-star-field');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'bg-star';
                const size = Math.random() * 2 + 'px';
                star.style.width = size; star.style.height = size;
                star.style.top = Math.random() * 100 + 'vh';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                field.appendChild(star);
            }
        }

        function spawn172Images() {
            const garden = document.getElementById('image-garden');
            for (let i = 1; i <= 172; i++) {
                const card = document.createElement('div');
                card.className = 'photo-card';
                const angle = Math.random() * Math.PI * 2;
                const radius = 350 + Math.random() * 350; 
                const yPos = (Math.random() - 0.5) * 700; 
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;

                card.style.transform = translate3d(${x}px, ${yPos}px, ${z}px) rotateY(${-angle}rad);
                
                // Matches format: 1 (1).jpg, 1 (2).jpg...
                const fileName = 1 (${i}).jpg;
                card.innerHTML = <img src="images/${fileName}" onerror="this.src='https://via.placeholder.com/100/ff1493/ffffff?text=❤️'">;
                garden.appendChild(card);
            }
        }

        function createOrbitingText() {
            const wrap = document.createElement('div');
            wrap.className = 'orbit-text-wrap';
            const words = ["I", "love", "you", "Kyal Sin Ko Ko", "❤️"];
            const radius = 400;words.forEach((word, index) => {
                const span = document.createElement('span');
                span.className = 'orbit-word';
                span.innerText = word;
                const angle = (index / words.length) * Math.PI * 2;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                span.style.transform = translate3d(${x}px, 0px, ${z}px) rotateY(${-angle}rad) translate(-50%, -50%);
                wrap.appendChild(span);
            });
            document.getElementById('orbit-elements').appendChild(wrap);
        }
    </script>
</body>
</html>
