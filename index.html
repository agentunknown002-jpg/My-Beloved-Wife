<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universe | Kyal Sin Ko Ko</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
        #universe { width: 100%; height: 100vh; perspective: 1200px; background: radial-gradient(circle at center, #1a000d 0%, #000 100%); }
        #scene { position: absolute; top: 50%; left: 50%; transform-style: preserve-3d; }

        /* HIGH-QUALITY SPHERE PLANET */
        .planet {
            position: absolute; width: 130px; height: 130px; border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #ffb3d9, #ff1493 45%, #660022 85%, #000 100%);
            transform: translate(-50%, -50%); 
            box-shadow: 0 0 80px rgba(255, 20, 147, 0.7), inset -15px -15px 40px rgba(0,0,0,0.9);
            display: flex; justify-content: center; align-items: center; z-index: 10;
            animation: pulse 3s infinite ease-in-out;
        }
        @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.05); } }
        .planet::after { content: '❤️'; font-size: 3rem; filter: drop-shadow(0 0 10px white); }

        /* PHOTO CARDS */
        .card { 
            position: absolute; width: 85px; height: 85px; background: #fff; 
            padding: 3px; border-radius: 4px; box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; border-radius: 2px; }
        
        /* PARTICLES */
        .star { position: absolute; background: #fff; border-radius: 50%; pointer-events: none; }
        .love-text { position: absolute; color: #ff69b4; font-weight: bold; font-size: 1.2rem; white-space: nowrap; pointer-events: none; text-shadow: 0 0 15px #ff1493; }
    </style>
</head>
<body onload="init()">

    <div id="universe">
        <div id="scene">
            <div class="planet"></div>
        </div>
    </div>

    <script>
        let ry = 0, rx = -10, isDragging = false, lastX, lastY;
        const scene = document.getElementById('scene');

        function init() {
            // 1. Generate Stars (Particles)
            for(let i=0; i<400; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                const r = 250 + Math.random() * 1100;
                const phi = Math.random() * 6.28;
                const theta = Math.random() * 3.14;
                
                const x = r * Math.sin(theta) * Math.cos(phi);
                const y = r * Math.sin(theta) * Math.sin(phi);
                const z = r * Math.cos(theta);
                
                s.style.width = s.style.height = (Math.random() * 3 + 1) + 'px';
                s.style.opacity = Math.random();
                
                // Store coordinates directly
                s.setAttribute('data-x', x);
                s.setAttribute('data-y', y);
                s.setAttribute('data-z', z);
                scene.appendChild(s);
            }

            // 2. Generate 172 Photos (Randomly spread)
            for(let i=1; i<=172; i++) {
                const c = document.createElement('div');
                c.className = 'card';
                
                const r = 400 + Math.random() * 500; 
                const phi = Math.random() * 6.28;
                const theta = Math.random() * 3.14;
                
                const x = r * Math.sin(theta) * Math.cos(phi);
                const y = r * Math.sin(theta) * Math.sin(phi);const z = r * Math.cos(theta);
                
                c.setAttribute('data-x', x);
                c.setAttribute('data-y', y);
                c.setAttribute('data-z', z);
                
                const img = document.createElement('img');
                img.src = 1 (${i}).jpg;
                img.onerror = function() { 
                    this.src = 1(${i}).jpg; 
                    this.onerror = function() { this.parentElement.remove(); };
                };
                
                c.appendChild(img);
                scene.appendChild(c);
            }

            // 3. Floating English Text
            const words = ["Love You", "Forever", "Always", "Queen", "Beautiful"];
            for(let i=0; i<15; i++) {
                const t = document.createElement('div');
                t.className = 'love-text';
                t.innerText = words[i % 5];
                const r = 600 + Math.random() * 200;
                const p = Math.random() * 6.28, th = Math.random() * 3.14;
                
                t.setAttribute('data-x', r * Math.sin(th) * Math.cos(p));
                t.setAttribute('data-y', r * Math.sin(th) * Math.sin(p));
                t.setAttribute('data-z', r * Math.cos(th));
                scene.appendChild(t);
            }

            animate();
        }

        // --- Interaction ---
        window.addEventListener('touchstart', e => { isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; });
        window.addEventListener('touchmove', e => {
            if(!isDragging) return;
            ry += (e.touches[0].clientX - lastX) * 0.4;
            rx -= (e.touches[0].clientY - lastY) * 0.4;
            lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
        });
        window.addEventListener('touchend', () => isDragging = false);

        function animate() {
            if(!isDragging) ry += 0.15; 
            
            scene.style.transform = rotateX(${rx}deg) rotateY(${ry}deg);
            
            // Forces all items to calculate position and face user
            const items = document.querySelectorAll('.card, .love-text, .star');
            items.forEach(item => {
                const x = item.getAttribute('data-x');
                const y = item.getAttribute('data-y');
                const z = item.getAttribute('data-z');
                // The -rx and -ry in the rotation counteracts the scene rotation
                item.style.transform = translate3d(${x}px, ${y}px, ${z}px) rotateY(${-ry}deg) rotateX(${-rx}deg);
            });

            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
