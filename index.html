<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universe</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; }
        
        #universe { width: 100%; height: 100vh; perspective: 1000px; background: #000; }
        #scene { position: absolute; top: 50%; left: 50%; transform-style: preserve-3d; }

        /* THE PERFECT SPHERE PLANET */
        .planet {
            position: absolute; width: 120px; height: 120px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ffb3d9, #ff1493 40%, #000 100%);
            transform: translate(-50%, -50%); 
            box-shadow: 0 0 50px #ff1493, inset -10px -10px 30px #000;
            display: flex; justify-content: center; align-items: center; z-index: 10;
        }
        .planet::after { content: '❤️'; font-size: 2.5rem; }

        /* PHOTO CARDS */
        .card { 
            position: absolute; width: 70px; height: 70px; background: #fff; 
            padding: 3px; border-radius: 4px; display: block;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        
        .star { position: absolute; background: #fff; border-radius: 50%; width: 2px; height: 2px; }
    </style>
</head>
<body>

    <div id="universe">
        <div id="scene">
            <div class="planet"></div>
        </div>
    </div>

    <script>
        let ry = 0, rx = -10, isDragging = false, lastX, lastY;
        const scene = document.getElementById('scene');
        const items = [];

        // 1. Create Stars
        for(let i=0; i<300; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const r = 200 + Math.random() * 800;
            const p = Math.random() * 6.28, t = Math.random() * 3.14;
            const x = r * Math.sin(t) * Math.cos(p);
            const y = r * Math.sin(t) * Math.sin(p);
            const z = r * Math.cos(t);
            scene.appendChild(s);
            items.push({ el: s, x: x, y: y, z: z });
        }

        // 2. Create Photos
        for(let i=1; i<=172; i++) {
            const c = document.createElement('div');
            c.className = 'card';
            const r = 300 + Math.random() * 500;
            const p = Math.random() * 6.28, t = Math.random() * 3.14;
            const x = r * Math.sin(t) * Math.cos(p);
            const y = r * Math.sin(t) * Math.sin(p);
            const z = r * Math.cos(t);
            
            c.innerHTML = <img src="1 (${i}).jpg" onerror="this.src='1(${i}).jpg';">;
            scene.appendChild(c);
            items.push({ el: c, x: x, y: y, z: z });
        }

        // --- Touch ---
        window.addEventListener('touchstart', e => { isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; });
        window.addEventListener('touchmove', e => {
            if(!isDragging) return;
            ry += (e.touches[0].clientX - lastX) * 0.3;
            rx -= (e.touches[0].clientY - lastY) * 0.3;
            lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
        });
        window.addEventListener('touchend', () => isDragging = false);

        function animate() {
            if(!isDragging) ry += 0.1;
            scene.style.transform = rotateX(${rx}deg) rotateY(${ry}deg);
            
            // BILLBOARDING (Face the screen)
            items.forEach(item => {
                item.el.style.transform = translate3d(${item.x}px, ${item.y}px, ${item.z}px) rotateY(${-ry}deg) rotateX(${-rx}deg);
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
