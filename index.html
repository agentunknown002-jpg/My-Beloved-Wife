<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universe</title>
    
    <script>
        // We put the function here so it is ready BEFORE the button exists
        function start() {
            // 1. Hide the login screen immediately
            document.getElementById('login-screen').style.display = 'none';
            // 2. Show the universe
            document.getElementById('universe').style.display = 'block';
            // 3. Start the stars and photos
            initGalaxy();
        }
    </script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; color: white; font-family: sans-serif; }
        
        /* LOGIN SCREEN */
        #login-screen {
            position: fixed; inset: 0; background: radial-gradient(circle, #2b001a, #000);
            display: flex; justify-content: center; align-items: center; z-index: 10000;
        }
        .box { background: rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 30px; text-align: center; width: 260px; border: 1px solid rgba(255, 105, 180, 0.4); }
        
        /* THE BUTTON */
        #btn { 
            width: 100%; padding: 20px; border-radius: 50px; border: none; 
            background: #ff1493; color: white; font-size: 1.4rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 0 20px #ff1493;
        }

        /* UNIVERSE VIEW */
        #universe { display: none; width: 100%; height: 100vh; perspective: 1000px; }
        #scene { position: absolute; top: 50%; left: 50%; transform-style: preserve-3d; }

        .planet {
            position: absolute; width: 150px; height: 150px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff69b4, #ff1493, #000);
            transform: translate(-50%, -50%); box-shadow: 0 0 60px #ff1493;
            display: flex; justify-content: center; align-items: center;
        }
        .planet::after { content: '❤️'; font-size: 4rem; }

        .card { position: absolute; width: 80px; height: 80px; background: #fff; border: 2px solid #fff; border-radius: 4px; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="box">
            <h1 style="margin-bottom: 30px;">Welcome</h1>
            <button id="btn" onclick="start()">ENTER ORBIT</button>
        </div>
    </div>

    <div id="universe">
        <div id="scene">
            <div class="planet"></div>
        </div>
    </div>

    <script>
        let ry = 0;
        function initGalaxy() {
            const scene = document.getElementById('scene');
            // 1. Stars
            for(let i=0; i<100; i++) {
                let s = document.createElement('div');
                s.className = 'star';
                let r = 200 + Math.random()*800;
                let p = Math.random()*Math.PI*2, t = Math.random()*Math.PI;
                s.style.width = s.style.height = '2px';
                s.style.transform = translate3d(${r*Math.sin(t)*Math.cos(p)}px, ${r*Math.sin(t)*Math.sin(p)}px, ${r*Math.cos(t)}px);
                scene.appendChild(s);
            }
            // 2. Photos (172 images)
            for(let i=1; i<=172; i++) {
                let c = document.createElement('div');
                c.className = 'card';
                let a = (i/172)*Math.PI*2;
                let r = 400;
                let y = (Math.random()-0.5)*500;
                c.style.transform = translate3d(${Math.cos(a)*r}px, ${y}px, ${Math.sin(a)*r}px) rotateY(${-a}rad);
                c.innerHTML = <img src="1 (${i}).jpg" onerror="this.parentElement.style.display='none'">;
                scene.appendChild(c);
            }
            loop();
        }function loop() {
            ry += 0.2;
            document.getElementById('scene').style.transform = rotateY(${ry}deg) rotateX(-10deg);
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
