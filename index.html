<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universe</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
        #universe { width: 100%; height: 100vh; perspective: 1000px; }
        #scene { position: absolute; top: 50%; left: 50%; transform-style: preserve-3d; transition: transform 0.1s ease-out; }

        /* THE HEART CORE */
        .planet {
            position: absolute; width: 120px; height: 120px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff85c1, #ff1493, #000);
            transform: translate(-50%, -50%); box-shadow: 0 0 60px #ff1493;
            display: flex; justify-content: center; align-items: center; z-index: 10;
        }
        .planet::after { content: '❤️'; font-size: 3rem; }

        /* PHOTO CARDS */
        .card { 
            position: absolute; width: 80px; height: 80px; background: #fff; 
            padding: 3px; border-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.8);
            display: block !important; visibility: visible !important;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; border-radius: 2px; }
        
        .star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.5; width: 2px; height: 2px; }
        .love-text { position: absolute; color: #ff69b4; font-weight: bold; font-size: 1.2rem; white-space: nowrap; text-shadow: 0 0 10px #000; }
    </style>
</head>
<body onload="init()">

    <div id="universe">
        <div id="scene">
            <div class="planet"></div>
        </div>
    </div>

    <script>
        let ry = 0, rx = -10, isDragging = false, lastX, lastY;

        function init() {
            const scene = document.getElementById('scene');
            
            // 1. Add 300 Stars
            for(let i=0; i<300; i++) {
                let s = document.createElement('div');
                s.className = 'star';
                let r = 300 + Math.random() * 1000;
                let p = Math.random() * 6.28, t = Math.random() * 3.14;
                s.dataset.x = r * Math.sin(t) * Math.cos(p);
                s.dataset.y = r * Math.sin(t) * Math.sin(p);
                s.dataset.z = r * Math.cos(t);
                scene.appendChild(s);
            }

            // 2. Add 172 Photos (Simplified Math)
            for(let i=1; i<=172; i++) {
                let c = document.createElement('div');
                c.className = 'card';
                // Spiral math
                let theta = i * 0.4 + Math.PI;
                let y = (i - 86) * 8; // Spread vertically
                let r = 350; 
                
                c.dataset.x = Math.cos(theta) * r;
                c.dataset.y = y;
                c.dataset.z = Math.sin(theta) * r;
                
                // Double check both naming patterns
                c.innerHTML = <img src="1 (${i}).jpg" onerror="this.src='1(${i}).jpg';">;
                scene.appendChild(c);
            }

            // 3. Love Text
            const words = ["Love You", "Forever", "Always", "Queen"];
            for(let i=0; i<10; i++) {
                let t = document.createElement('div');
                t.className = 'love-text';
                t.innerText = words[i % words.length];
                let a = (i/10) * 6.28;
                t.dataset.x = Math.cos(a) * 550;
                t.dataset.y = (Math.random()-0.5) * 400;
                t.dataset.z = Math.sin(a) * 550;
                scene.appendChild(t);
            }

            animate();
        }// Touch Listeners
        window.addEventListener('touchstart', e => { isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; });
        window.addEventListener('touchmove', e => {
            if(!isDragging) return;
            ry += (e.touches[0].clientX - lastX) * 0.4;
            rx -= (e.touches[0].clientY - lastY) * 0.4;
            lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
        });
        window.addEventListener('touchend', () => isDragging = false);

        function animate() {
            if(!isDragging) ry += 0.15;
            document.getElementById('scene').style.transform = rotateX(${rx}deg) rotateY(${ry}deg);
            
            // BILLBOARDING
            const items = document.querySelectorAll('.card, .love-text, .star');
            items.forEach(item => {
                let x = item.dataset.x, y = item.dataset.y, z = item.dataset.z;
                // Forces items to face the screen
                item.style.transform = translate3d(${x}px, ${y}px, ${z}px) rotateY(${-ry}deg) rotateX(${-rx}deg);
            });

            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
