<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kyal Sin Ko Ko | Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        
        /* LOGIN SCREEN */
        #gate {
            position: fixed; inset: 0; background: radial-gradient(circle at center, #1a000d, #000);
            display: flex; justify-content: center; align-items: center; z-index: 10000; transition: opacity 0.8s ease;
        }
        .login-box { text-align: center; width: 290px; padding: 40px; background: rgba(255,255,255,0.03); border-radius: 40px; backdrop-filter: blur(20px); border: 1px solid rgba(255,20,147,0.2); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { font-family: 'Pacifico', cursive; color: #ff69b4; margin-bottom: 5px; font-size: 2.2rem; }
        p { font-size: 0.8rem; opacity: 0.5; margin-bottom: 25px; letter-spacing: 1px; }

        /* NAME INPUT */
        input {
            width: 100%; padding: 15px; border-radius: 25px; border: 1px solid rgba(255,105,180,0.3);
            background: rgba(0,0,0,0.3); color: white; text-align: center; font-size: 1rem;
            margin-bottom: 20px; outline: none; box-sizing: border-box;
        }
        input:focus { border-color: #ff1493; box-shadow: 0 0 10px rgba(255,20,147,0.3); }

        #start-btn { 
            background: linear-gradient(45deg, #ff1493, #ff69b4); color: white; border: none; padding: 18px; width: 100%;
            border-radius: 50px; font-size: 1.1rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 20, 147, 0.4);
        }

        /* UNIVERSE SETUP */
        #universe { display: none; width: 100%; height: 100vh; perspective: 1200px; background: #000; }
        #scaler { width: 100%; height: 100%; transform-style: preserve-3d; }
        #scene { position: absolute; top: 50%; left: 50%; transform-style: preserve-3d; }

        /* THE GLOWING HEART PLANET */
        .planet {
            position: absolute; width: 160px; height: 160px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff85c1, #ff1493, #33001a);
            transform: translate(-50%, -50%);
            box-shadow: 0 0 80px rgba(255, 20, 147, 0.7), inset -15px -15px 50px rgba(0,0,0,0.9);
            display: flex; justify-content: center; align-items: center; z-index: 10;
        }
        .planet::after { content: '❤️'; font-size: 4rem; filter: drop-shadow(0 0 10px white); animation: beat 1.5s infinite; }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* PHOTO CARDS */
        .card { 
            position: absolute; width: 85px; height: 85px; background: #fff; 
            padding: 4px; border-radius: 4px; box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            backface-visibility: hidden; opacity: 0; transform-style: preserve-3d;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; border-radius: 2px; }

        .star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.4; pointer-events: none; }
        .love-text { position: absolute; font-family: 'Pacifico', cursive; color: #fff; font-size: 1.6rem; text-shadow: 0 0 15px #ff1493; white-space: nowrap; pointer-events: none; }
    </style>
</head>
<body>

    <div id="gate">
        <div class="login-box">
            <h1>Universe</h1>
            <p>ENTER YOUR FULL NAME</p>
            <input type="text" id="nameInput" placeholder="Kyal Sin Ko Ko" autocomplete="off">
            <button id="start-btn" onclick="checkName()">ENTER ORBIT</button>
        </div>
    </div><div id="universe">
        <div id="scaler">
            <div id="scene">
                <div class="planet"></div>
            </div>
        </div>
    </div>

    <script>
        let ry = 0, rx = -10, zoom = 1, isDragging = false, lastX, lastY, pDist = 0;

        function checkName() {
            const name = document.getElementById('nameInput').value.trim().toLowerCase();
            // Validates "Kyal Sin Ko Ko" with or without spaces
            if (name === "kyal sin ko ko" || name === "kyalsinkoko") {
                startUniverse();
            } else {
                alert("Incorrect Name. Please try again, my love.");
            }
        }

        function startUniverse() {
            document.getElementById('gate').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('universe').style.display = 'block';
            }, 800);
            
            const scene = document.getElementById('scene');

            // 1. Starfield
            for(let i=0; i<200; i++) {
                let s = document.createElement('div');
                s.className = 'star';
                let r = 300 + Math.random()*1000;
                let p = Math.random()*Math.PI*2, t = Math.random()*Math.PI;
                s.style.width = s.style.height = (Math.random()*2 + 1) + 'px';
                s.style.transform = translate3d(${r*Math.sin(t)*Math.cos(p)}px, ${r*Math.sin(t)*Math.sin(p)}px, ${r*Math.cos(t)}px);
                scene.appendChild(s);
            }

            // 2. Spawn 172 Photos (Staggered to prevent Vercel lag)
            let i = 1;
            function spawn() {
                if(i > 172) return;
                let c = document.createElement('div');
                c.className = 'card';
                let angle = (i / 172) * Math.PI * 2;
                let dist = 400 + (Math.random() * 150);
                let y = (Math.random() - 0.5) * 750;
                
                c.style.transform = translate3d(${Math.cos(angle)*dist}px, ${y}px, ${Math.sin(angle)*dist}px) rotateY(${-angle}rad);
                c.innerHTML = <img src="1 (${i}).jpg" loading="lazy" onerror="this.parentElement.remove()">;
                scene.appendChild(c);
                
                setTimeout(() => c.style.opacity = "1", 50);
                i++;
                setTimeout(spawn, 40);
            }
            spawn();

            // 3. Love Text
            for(let j=0; j<10; j++){
                let t = document.createElement('div');
                t.className = 'love-text';
                t.innerText = "I love Kyal Sin Ko Ko";
                let a = (j/10)*Math.PI*2;
                t.style.transform = translate3d(${Math.cos(a)*550}px, ${(j-5)*80}px, ${Math.sin(a)*550}px) rotateY(${-a}rad);
                scene.appendChild(t);
            }

            setupControls();
            loop();
        }

        function setupControls() {
            window.ontouchstart = e => {
                if(e.touches.length === 2) pDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                else { isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; }
            };
            window.ontouchmove = e => {
                if(e.touches.length === 2) {
                    let d = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                    zoom *= (d/pDist); zoom = Math.max(0.3, Math.min(zoom, 3)); pDist = d;
                } else if(isDragging) {
                    ry += (e.touches[0].clientX - lastX) * 0.4;
                    rx -= (e.touches[0].clientY - lastY) * 0.4;
                    lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
                }
            };
            window.ontouchend = () => isDragging = false;
        }function loop() {
            if(!isDragging) ry += 0.15;
            document.getElementById('scene').style.transform = rotateX(${rx}deg) rotateY(${ry}deg);
            document.getElementById('scaler').style.transform = scale(${zoom});
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
