<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        
        /* SIMPLE LOGIN */
        #gate { 
            position: fixed; inset: 0; background: #000; 
            display: flex; justify-content: center; align-items: center; z-index: 10000; 
        }
        .login-box { text-align: center; width: 85%; max-width: 300px; }
        h1 { font-family: 'Pacifico', cursive; color: #ff69b4; font-size: 2.5rem; margin-bottom: 20px; }
        
        input { 
            width: 100%; padding: 18px; border-radius: 15px; border: 2px solid #ff1493; 
            background: #111; color: #fff; text-align: center; margin-bottom: 20px; 
            font-size: 1.1rem; outline: none; box-sizing: border-box;
        }

        /* THE BUTTON - BIGGER FOR MOBILE */
        #start-btn { 
            background: #ff1493; color: white; border: none; padding: 20px; width: 100%; 
            border-radius: 15px; font-size: 1.2rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.5);
        }

        /* UNIVERSE */
        #universe { display: none; width: 100%; height: 100vh; perspective: 1000px; }
        #scene { position: absolute; top: 50%; left: 50%; transform-style: preserve-3d; }

        .planet {
            position: absolute; width: 160px; height: 160px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff85c1, #ff1493, #000);
            transform: translate(-50%, -50%); box-shadow: 0 0 100px #ff1493;
            display: flex; justify-content: center; align-items: center; z-index: 100;
        }
        .planet::after { content: '❤️'; font-size: 4rem; }

        .card { position: absolute; width: 90px; height: 90px; background: #fff; border-radius: 5px; opacity: 0; transition: opacity 0.5s; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.6; }
    </style>
</head>
<body>

    <div id="gate">
        <div class="login-box">
            <h1>Universe</h1>
            <input type="text" id="nameInput" placeholder="Enter her name..." autocomplete="off">
            <button id="start-btn">ENTER ORBIT</button>
        </div>
    </div>

    <div id="universe">
        <div id="scene">
            <div class="planet"></div>
        </div>
    </div>

    <script>
        // We use a Direct Event Listener - it is more stable than 'onclick'
        document.getElementById('start-btn').addEventListener('click', function() {
            const name = document.getElementById('nameInput').value.trim().toLowerCase();
            
            // Checks for "kyal sin ko ko" regardless of spaces
            if (name.replace(/\s/g, "") === "kyalsinkoko") {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('universe').style.display = 'block';
                startGalaxy();
            } else {
                alert("Incorrect name. Please try again.");
            }
        });

        let ry = 0;
        function startGalaxy() {
            const sc = document.getElementById('scene');

            // 1. Stars
            for(let i=0; i<200; i++) {
                let s = document.createElement('div');
                s.className = 'star';
                let r = 200 + Math.random()*900;
                let p = Math.random()*Math.PI*2, t = Math.random()*Math.PI;
                s.style.width = s.style.height = '2px';
                s.style.transform = translate3d(${r*Math.sin(t)*Math.cos(p)}px, ${r*Math.sin(t)*Math.sin(p)}px, ${r*Math.cos(t)}px);
                sc.appendChild(s);
            }// 2. Photos (Staggered loading)
            let idx = 1;
            function addOne() {
                if(idx > 172) return;
                let c = document.createElement('div');
                c.className = 'card';
                let a = (idx/172)*Math.PI*2;
                let r = 420; 
                c.style.transform = translate3d(${Math.cos(a)*r}px, ${(Math.random()-0.5)*600}px, ${Math.sin(a)*r}px) rotateY(${-a}rad);
                
                // Backup format check: "1 (1).jpg" or "1(1).jpg"
                c.innerHTML = <img src="1 (${idx}).jpg" onerror="this.src='1(${idx}).jpg'; this.onerror=function(){this.parentElement.remove();}">;
                
                sc.appendChild(c);
                setTimeout(() => c.style.opacity = 1, 50);
                idx++;
                setTimeout(addOne, 30); 
            }
            addOne();
            loop();
        }

        function loop() {
            ry += 0.15;
            document.getElementById('scene').style.transform = rotateY(${ry}deg) rotateX(-10deg);
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
