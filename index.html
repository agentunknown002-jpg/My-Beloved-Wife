<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universe</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
        #universe { width: 100%; height: 100vh; perspective: 1200px; }
        #scene { position: absolute; top: 50%; left: 50%; transform-style: preserve-3d; }

        /* THE HEART CORE */
        .planet {
            position: absolute; width: 100px; height: 100px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff85c1, #ff1493, #33001a);
            transform: translate(-50%, -50%); box-shadow: 0 0 50px #ff1493;
            display: flex; justify-content: center; align-items: center; z-index: 10;
        }
        .planet::after { content: '❤️'; font-size: 2.5rem; }

        /* PHOTO CARDS */
        .card { 
            position: absolute; width: 75px; height: 75px; background: #fff; 
            padding: 3px; border-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.8);
            backface-visibility: hidden;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        
        .star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.5; width: 2px; height: 2px; pointer-events: none; }
        .love-text { position: absolute; color: #ff69b4; font-weight: bold; font-size: 1rem; white-space: nowrap; pointer-events: none; }
    </style>
</head>
<body onload="init()">

    <div id="universe">
        <div id="scene">
            <div class="planet"></div>
        </div>
    </div>

    <script>
        let ry = 0, rx = -10, isDragging = false, lastX, lastY;

        function init() {
            const scene = document.getElementById('scene');
            
            // 1. Add 200 Stars
            for(let i=0; i<200; i++) {
                let s = document.createElement('div');
                s.className = 'star';
                let r = 200 + Math.random() * 800;
                let p = Math.random() * 6.28, t = Math.random() * 3.14;
                s.dataset.x = r * Math.sin(t) * Math.cos(p);
                s.dataset.y = r * Math.sin(t) * Math.sin(p);
                s.dataset.z = r * Math.cos(t);
                scene.appendChild(s);
            }

            // 2. Add 172 Photos in a simple Ring Cloud
            for(let i=1; i<=172; i++) {
                let c = document.createElement('div');
                c.className = 'card';
                
                let angle = (i / 172) * Math.PI * 4; // Two full loops
                let r = 300 + (Math.random() * 100);
                let y = (i - 86) * 6;
                
                c.dataset.x = Math.cos(angle) * r;
                c.dataset.y = y;
                c.dataset.z = Math.sin(angle) * r;
                
                // Photo Loading Fail-Safe
                let img = document.createElement('img');
                img.src = "1 (" + i + ").jpg";
                img.onerror = function() {
                    this.src = "1(" + i + ").jpg"; // Tries name without space
                    this.onerror = function() { this.parentElement.style.display = 'none'; }; // Hide if both fail
                };
                
                c.appendChild(img);
                scene.appendChild(c);
            }

            // 3. Simple Text
            const words = ["Love", "Always", "Forever"];
            for(let i=0; i<6; i++) {
                let t = document.createElement('div');
                t.className = 'love-text';
                t.innerText = words[i % 3];
                let a = (i/6) * 6.28;
                t.dataset.x = Math.cos(a) * 500;
                t.dataset.y = (i-3) * 50;
                t.dataset.z = Math.sin(a) * 500;
                scene.appendChild(t);
            }

            renderLoop();
        }// --- Basic Touch Handling ---
        window.addEventListener('touchstart', e => { 
            isDragging = true; 
            lastX = e.touches[0].clientX; 
            lastY = e.touches[0].clientY; 
        });

        window.addEventListener('touchmove', e => {
            if(!isDragging) return;
            let dx = e.touches[0].clientX - lastX;
            let dy = e.touches[0].clientY - lastY;
            ry += dx * 0.5;
            rx -= dy * 0.5;
            lastX = e.touches[0].clientX;
            lastY = e.touches[0].clientY;
        });

        window.addEventListener('touchend', () => isDragging = false);

        function renderLoop() {
            if(!isDragging) ry += 0.2; // Keep it spinning
            
            // Apply rotation to the whole scene
            document.getElementById('scene').style.transform = "rotateX(" + rx + "deg) rotateY(" + ry + "deg)";
            
            // Force every element to face the user (Billboarding)
            const elements = document.querySelectorAll('.card, .star, .love-text');
            for(let i=0; i < elements.length; i++) {
                let el = elements[i];
                let x = el.dataset.x;
                let y = el.dataset.y;
                let z = el.dataset.z;
                // Complex transform to position and then un-rotate
                el.style.transform = "translate3d(" + x + "px," + y + "px," + z + "px) rotateY(" + (-ry) + "deg) rotateX(" + (-rx) + "deg)";
            }

            requestAnimationFrame(renderLoop);
        }
    </script>
</body>
</html>
