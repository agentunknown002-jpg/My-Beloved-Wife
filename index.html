<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universe</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; }
        #universe { width: 100%; height: 100vh; perspective: 1000px; background: radial-gradient(circle, #1a000d, #000); }
        #scene { position: absolute; top: 50%; left: 50%; transform-style: preserve-3d; }

        /* PHOTO CARDS */
        .card { 
            position: absolute; width: 75px; height: 75px; background: white; 
            padding: 2px; border-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            display: block;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        
        /* STARS & CORE PARTICLES */
        .star { position: absolute; background: white; border-radius: 50%; pointer-events: none; }
        .core-star { position: absolute; background: #ff1493; border-radius: 50%; box-shadow: 0 0 10px #ff69b4; pointer-events: none; }
    </style>
</head>
<body>

    <div id="universe">
        <div id="scene">
            </div>
    </div>

    <script>
        var scene = document.getElementById('scene');
        var ry = 0;
        var rx = -10;
        var isDragging = false;
        var lastX, lastY;
        var allItems = [];

        // 1. CREATE CENTRAL PARTICLE CORE (Replacing the planet)
        for (var c = 0; c < 150; c++) {
            var cs = document.createElement('div');
            cs.className = 'core-star';
            var cr = Math.random() * 40; // Small radius for core
            var cp = Math.random() * 6.28;
            var ct = Math.random() * 3.14;
            var cx = cr * Math.sin(ct) * Math.cos(cp);
            var cy = cr * Math.sin(ct) * Math.sin(cp);
            var cz = cr * Math.cos(ct);
            cs.style.width = cs.style.height = (Math.random() * 4 + 2) + 'px';
            scene.appendChild(cs);
            allItems.push({ el: cs, x: cx, y: cy, z: cz });
        }

        // 2. CREATE OUTER STARS
        for (var i = 0; i < 300; i++) {
            var s = document.createElement('div');
            s.className = 'star';
            var r = 150 + Math.random() * 900;
            var p = Math.random() * 6.28;
            var t = Math.random() * 3.14;
            var x = r * Math.sin(t) * Math.cos(p);
            var y = r * Math.sin(t) * Math.sin(p);
            var z = r * Math.cos(t);
            s.style.width = s.style.height = (Math.random() * 2 + 1) + 'px';
            scene.appendChild(s);
            allItems.push({ el: s, x: x, y: y, z: z });
        }

        // 3. CREATE 172 PHOTOS (Random Spread)
        for (var j = 1; j <= 172; j++) {
            var card = document.createElement('div');
            card.className = 'card';
            var r2 = 300 + Math.random() * 500;
            var p2 = Math.random() * 6.28;
            var t2 = Math.random() * 3.14;
            var x2 = r2 * Math.sin(t2) * Math.cos(p2);
            var y2 = r2 * Math.sin(t2) * Math.sin(p2);
            var z2 = r2 * Math.cos(t2);
            
            card.innerHTML = '<img src="1 (' + j + ').jpg" onerror="this.src=\'1(' + j + ').jpg\';">';
            scene.appendChild(card);
            allItems.push({ el: card, x: x2, y: y2, z: z2 });
        }

        // --- MOUSE & TOUCH CONTROLS ---
        function startDrag(x, y) {
            isDragging = true;
            lastX = x;
            lastY = y;
        }
        function moveDrag(x, y) {
            if (!isDragging) return;
            ry += (x - lastX) * 0.3;
            rx -= (y - lastY) * 0.3;
            lastX = x;
            lastY = y;
        }
        function endDrag() { isDragging = false; }// Mouse Events
        window.onmousedown = function(e) { startDrag(e.clientX, e.clientY); };
        window.onmousemove = function(e) { moveDrag(e.clientX, e.clientY); };
        window.onmouseup = endDrag;

        // Touch Events (For Mobile)
        window.ontouchstart = function(e) { startDrag(e.touches[0].clientX, e.touches[0].clientY); };
        window.ontouchmove = function(e) { moveDrag(e.touches[0].clientX, e.touches[0].clientY); };
        window.ontouchend = endDrag;

        // --- ANIMATION LOOP ---
        function animate() {
            if (!isDragging) { ry += 0.15; } // Automatic slow spin
            
            scene.style.transform = 'rotateX(' + rx + 'deg) rotateY(' + ry + 'deg)';
            
            for (var k = 0; k < allItems.length; k++) {
                var item = allItems[k];
                // BILLBOARDING: translate and counter-rotate
                item.el.style.transform = 'translate3d(' + item.x + 'px,' + item.y + 'px,' + item.z + 'px) rotateY(' + (-ry) + 'deg) rotateX(' + (-rx) + 'deg)';
            }
            window.requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
