<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universe | Kyal Sin Ko Ko</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        /* Perspective increased for deep view */
        #universe { width: 100%; height: 100vh; perspective: 2500px; background: radial-gradient(circle at center, #2b0016 0%, #000 100%); }
        
        #zoom-layer { width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.15s ease-out; }
        #scene { position: absolute; top: 50%; left: 50%; transform-style: preserve-3d; will-change: transform; }

        .card { 
            position: absolute; width: 80px; height: 80px; background: white; 
            padding: 2px; border-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); 
            will-change: transform; backface-visibility: hidden;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; border-radius: 2px; }
        
        /* STAR PARTICLES - Density increased */
        .star { position: absolute; background: #fff; border-radius: 50%; pointer-events: none; will-change: transform; }
        .heart-star { position: absolute; background: #ff1493; border-radius: 50%; box-shadow: 0 0 10px #ff69b4; pointer-events: none; }
        
        #msg { 
            position: absolute; transform-style: preserve-3d; color: #ff69b4; 
            text-align: center; font-weight: bold; font-size: 1.3rem; width: 320px;
            text-shadow: 0 0 15px rgba(255, 20, 147, 0.8); pointer-events: none;
            line-height: 1.4;
        }
    </style>
</head>
<body onclick="playMusic()">

    <audio id="bgMusic" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div id="universe">
        <div id="zoom-layer">
            <div id="scene">
                <div id="msg">I love you more than anything<br>Kyal Sin Ko Ko</div>
            </div>
        </div>
    </div>

    <script>
        var scene = document.getElementById('scene');
        var zoomLayer = document.getElementById('zoom-layer');
        
        var ry = 0, rx = -10, zoom = -1000; // Starting further out to see the density
        var isDragging = false, lastX, lastY, lastDist = 0;
        var allItems = [];

        function playMusic() {
            var audio = document.getElementById('bgMusic');
            audio.play().catch(function(e) {});
        }

        // 1. HEART CORE (No changes here)
        for (var i = 0; i < 220; i++) {
            var t = (i / 220) * Math.PI * 2;
            var cs = document.createElement('div');
            cs.className = 'heart-star';
            var scale = 7; 
            var cx = 16 * Math.pow(Math.sin(t), 3) * scale;
            var cy = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * scale;
            var cz = (Math.random() - 0.5) * 30; 
            cs.style.width = cs.style.height = (Math.random() * 3 + 2) + 'px';
            scene.appendChild(cs);
            allItems.push({ el: cs, x: cx, y: cy, z: cz });
        }

        // 2. GALAXY PARTICLES - Density increased to 800
        for (var k = 0; k < 800; k++) {
            var s = document.createElement('div');
            s.className = 'star';
            
            // Varied distance for deep effect
            var r = 350 + Math.random() * 2000; // Deep space spread
            var p = Math.random() * 6.28, th = Math.random() * 3.14;
            var x = r * Math.sin(th) * Math.cos(p), y = r * Math.sin(th) * Math.sin(p), z = r * Math.cos(th);// Varied size and brightness for depth
            var size = (Math.random() * 2.5 + 1);
            s.style.width = s.style.height = size + 'px';
            s.style.opacity = (Math.random() * 0.6 + 0.3); // Twinkling range
            if (size > 2) { s.style.boxShadow = "0 0 5px white"; } // Bright stars glow

            scene.appendChild(s);
            allItems.push({ el: s, x: x, y: y, z: z });
        }

        // 3. PHOTOS (No changes here)
        for (var j = 1; j <= 172; j++) {
            var card = document.createElement('div');
            card.className = 'card';
            var r2 = 400 + Math.random() * 1000; // Random spread
            var p2 = Math.random() * 6.28, th2 = Math.random() * 3.14;
            var x2 = r2 * Math.sin(th2) * Math.cos(p2), y2 = r2 * Math.sin(th2) * Math.sin(p2), z2 = r2 * Math.cos(th2);
            card.innerHTML = '<img src="1 (' + j + ').jpg" onerror="this.src=\'1(\'+j+\').jpg\';this.onerror=function(){this.parentElement.remove();}">';
            scene.appendChild(card);
            allItems.push({ el: card, x: x2, y: y2, z: z2 });
        }

        // --- INTERACTION ---
        window.onwheel = function(e) { zoom -= e.deltaY * 1.5; updateZoom(); };

        window.ontouchstart = function(e) {
            if (e.touches.length === 2) {
                lastDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            } else {
                isDragging = true;
                lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
            }
        };

        window.ontouchmove = function(e) {
            if (e.touches.length === 2) {
                var dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                zoom += (dist - lastDist) * 3.5; // Zoom sensitive
                lastDist = dist;
                updateZoom();
            } else if (isDragging) {
                ry += (e.touches[0].clientX - lastX) * 0.35;
                rx -= (e.touches[0].clientY - lastY) * 0.35;
                lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
            }
        };

        window.onmousedown = function(e) { isDragging = true; lastX = e.clientX; lastY = e.clientY; };
        window.onmousemove = function(e) { 
            if (isDragging) {
                ry += (e.clientX - lastX) * 0.35;
                rx -= (e.clientY - lastY) * 0.35;
                lastX = e.clientX; lastY = e.clientY;
            }
        };
        window.onmouseup = window.ontouchend = function() { isDragging = false; };

        function updateZoom() {
            zoom = Math.max(-3000, Math.min(1000, zoom)); 
            zoomLayer.style.transform = 'translateZ(' + zoom + 'px)';
        }

        function animate() {
            if (!isDragging) ry += 0.1; // Slow spin for galaxy feel
            scene.style.transform = 'rotateX(' + rx + 'deg) rotateY(' + ry + 'deg)';
            
            var invRy = -ry;
            var invRx = -rx;

            for (var n = 0; n < allItems.length; n++) {
                var it = allItems[n];
                // Smooth GPU-accelerated billboarding
                it.el.style.transform = 'translate3d('+it.x+'px,'+it.y+'px,'+it.z+'px) rotateY('+invRy+'deg) rotateX('+invRx+'deg)';
            }
            document.getElementById('msg').style.transform = 'translate(-50%, -50%) rotateY('+invRy+'deg) rotateX('+invRx+'deg)';
            window.requestAnimationFrame(animate);
        }
        
        updateZoom();
        animate();
    </script>
</body>
</html>
