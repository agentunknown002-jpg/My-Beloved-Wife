<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universe | Kyal Sin Ko Ko</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #gate { 
            position: fixed; inset: 0; z-index: 9999; 
            background: radial-gradient(circle, #2b001a 0%, #000 100%);
            display: flex; justify-content: center; align-items: center;
        }
        .btn { 
            padding: 20px 50px; background: #ff1493; border: none; color: white; 
            font-size: 22px; font-weight: bold; border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 30px #ff1493; transition: transform 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="gate">
        <button class="btn" onclick="startUniverse()">ENTER UNIVERSE</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FontLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/geometries/TextGeometry.js"></script>

    <script>
        function startUniverse() {
            // Immediately hide the button
            document.getElementById('gate').style.display = 'none';
            
            // Start the 3D Engine
            init3D();
        }

        let scene, camera, renderer, controls;

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 25;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.8;

            // 1. LIGHTING
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);
            const point = new THREE.PointLight(0xff1493, 2, 100);
            scene.add(point);

            // 2. THE CORE
            const core = new THREE.Mesh(
                new THREE.SphereGeometry(2.5, 32, 32),
                new THREE.MeshStandardMaterial({ color: 0xff1493, emissive: 0xff69b4, emissiveIntensity: 2 })
            );
            scene.add(core);

            // 3. 10,000 PARTICLES (STARS)
            const starGeo = new THREE.BufferGeometry();
            const starPos = [];
            for(let i=0; i<10000; i++) {
                starPos.push((Math.random()-0.5)*200, (Math.random()-0.5)*200, (Math.random()-0.5)*200);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
            const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
            scene.add(new THREE.Points(starGeo, starMat));

            // 4. FLOATING TEXT
            const fontLoader = new THREE.FontLoader();
            fontLoader.load('https://threejs.org/examples/fonts/helvetiker_bold.typeface.json', (font) => {
                const words = ["Love You", "Forever", "Always", "Kyal Sin"];
                for(let i = 0; i < 30; i++) {const tGeo = new THREE.TextGeometry(words[Math.floor(Math.random()*words.length)], { font: font, size: 0.5, height: 0.1 });
                    const tMesh = new THREE.Mesh(tGeo, new THREE.MeshBasicMaterial({ color: 0xff69b4 }));
                    tMesh.position.set((Math.random()-0.5)*60, (Math.random()-0.5)*40, (Math.random()-0.5)*60);
                    scene.add(tMesh);
                }
            });

            // 5. 172 PHOTOS (BILLBOARDING)
            const texLoader = new THREE.TextureLoader();
            for (let i = 1; i <= 172; i++) {
                const texture = texLoader.load(1 (${i}).jpg);
                const material = new THREE.SpriteMaterial({ map: texture });
                const sprite = new THREE.Sprite(material);
                
                const phi = Math.acos(-1 + (2 * i) / 172);
                const theta = Math.sqrt(172 * Math.PI) * phi;
                const r = 15 + Math.random() * 5;

                sprite.position.set(r*Math.cos(theta)*Math.sin(phi), r*Math.sin(theta)*Math.sin(phi), r*Math.cos(phi));
                sprite.scale.set(2.5, 2.5, 1);
                scene.add(sprite);
            }

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(controls) controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            if(!camera) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
