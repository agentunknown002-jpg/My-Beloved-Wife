<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Beloved Wife</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        /* LOGIN SCREEN */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #4a001e, #000000);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 1s ease;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px; border-radius: 20px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 105, 180, 0.4);
            text-align: center; color: white;
            box-shadow: 0 0 30px rgba(255, 20, 147, 0.3);
        }

        input {
            padding: 12px; border-radius: 25px; border: none;
            width: 200px; margin-bottom: 20px; outline: none;
            text-align: center; font-size: 1rem;
        }

        button {
            background: #ff1493; color: white; border: none;
            padding: 12px 25px; border-radius: 25px;
            cursor: pointer; font-weight: bold; transition: 0.3s;
        }

        button:hover { background: #ff69b4; transform: scale(1.05); }

        /* MAIN SCENE (Initially Hidden) */
        #main-content {
            display: none; width: 100%; height: 100vh;
            background: url('https://www.transparenttextures.com/patterns/stardust.png'), radial-gradient(circle, #2b0017, #000);
            position: relative;
            transform: scale(0); opacity: 0;
            transition: transform 2.5s ease-out, opacity 2s ease;
        }

        .zoom-in-effect {
            display: block !important; transform: scale(1) !important; opacity: 1 !important;
        }

        .heart_planet_love {
            font-family: 'Pacifico', cursive;
            font-size: 3rem; color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 1), 0 0 30px #ff1493;
            text-align: center; padding-top: 50px;
            letter-spacing: 2px;
        }

        /* THE ORBIT SYSTEM */
        .universe {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
        }

        .center-planet img {
            width: 150px; height: 150px;
            filter: drop-shadow(0 0 25px #ff1493);
            z-index: 10; position: relative;
        }

        .orbit-photo {
            position: absolute; width: 60px; height: 60px;
            border-radius: 10px; border: 2px solid white;
            overflow: hidden; box-shadow: 0 0 15px rgba(255,255,255,0.5);
            animation: orbit linear infinite;
        }

        .orbit-photo img { width: 100%; height: 100%; object-fit: cover; }

        @keyframes orbit {
            from { transform: rotate(0deg) translateX(var(--distance)) rotate(0deg); }
            to   { transform: rotate(360deg) translateX(var(--distance)) rotate(-360deg); }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="your-music-file.mp3" type="audio/mpeg">
    </audio>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="font-family: 'Pacifico', cursive;">Welcome</h2>
            <p>Please enter the name of the most beautiful woman</p>
            <input type="text" id="username" placeholder="Username...">
            <br>
            <button onclick="checkLogin()">Enter Orbit</button>
        </div>
    </div><div id="main-content">
        <h1 class="heart_planet_love">ALEX DEV</h1>
        <div class="universe">
            <div class="center-planet">
                <img src="https://pngimg.com/uploads/heart/heart_PNG51335.png" alt="Heart">
            </div>
            <div id="orbit-garden"></div>
        </div>
    </div>

    <script>
        function checkLogin() {
            const userInp = document.getElementById('username').value.trim();
            const music = document.getElementById('bg-music');
            const mainContent = document.getElementById('main-content');
            const loginScreen = document.getElementById('login-screen');
            
            // EXACT match required
            if (userInp === "Kyal Sin Ko Ko") {
                loginScreen.style.opacity = "0";
                setTimeout(() => { loginScreen.style.display = 'none'; }, 1000);

                generateImages(172);
                
                // Note: Browser might block auto-play without user interaction
                music.play().catch(e => console.log("Music play blocked by browser"));
                
                mainContent.style.display = 'block';
                setTimeout(() => {
                    mainContent.classList.add('zoom-in-effect');
                }, 100); 
            } else {
                alert("That's not the correct name! Try again.");
            }
        }

        function generateImages(count) {
            const garden = document.getElementById('orbit-garden');
            for (let i = 1; i <= count; i++) {
                const imgDiv = document.createElement('div');
                imgDiv.className = 'orbit-photo';
                
                const distance = Math.floor(Math.random() * 400) + 120; 
                const duration = Math.floor(Math.random() * 25) + 15;   
                const delay = Math.random() * -30;                      
                
                imgDiv.style.setProperty('--distance', ${distance}px);
                imgDiv.style.animationDuration = ${duration}s;
                imgDiv.style.animationDelay = ${delay}s;
                
                // This looks for images/1.jpg, images/2.jpg...
                imgDiv.innerHTML = <img src="images/${i}.jpg" onerror="this.src='https://via.placeholder.com/100?text=Love'">;
                
                garden.appendChild(imgDiv);
            }
        }
    </script>
</body>
</html>
