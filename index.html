<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kyal Sin Ko Ko - Planet</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; color: white; }
        
        /* LOGIN SCREEN */
        #login-screen {
            position: fixed; inset: 0; background: radial-gradient(circle, #20002c, #000);
            display: flex; justify-content: center; align-items: center; z-index: 10000;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.1); padding: 30px; border-radius: 20px;
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center; width: 280px;
        }
        input { width: 90%; padding: 12px; border-radius: 20px; border: none; margin-bottom: 20px; text-align: center; outline: none; }
        button { width: 100%; padding: 12px; border-radius: 20px; border: none; background: #ff0080; color: white; font-weight: bold; cursor: pointer; font-size: 1rem; }

        /* SCENE STYLING */
        #main-content { display: none; width: 100%; height: 100vh; perspective: 1200px; background: #000; }
        
        /* THE PRETTY PLANET */
        .planet {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 180px; height: 180px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff00cc, #3333ff, #000);
            box-shadow: 0 0 80px rgba(186, 1, 255, 0.6), inset -25px -25px 40px rgba(0,0,0,0.8);
            z-index: 5;
        }

        #scene-root {
            position: absolute; top: 50%; left: 50%; transform-style: preserve-3d;
            width: 0; height: 0;
        }

        .photo-card {
            position: absolute; width: 65px; height: 65px;
            background: #fff; border: 1px solid #fff; border-radius: 8px;
            overflow: hidden; box-shadow: 0 0 10px rgba(255,255,255,0.4);
            backface-visibility: hidden;
        }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; }

        .orbit-text {
            position: absolute; font-family: 'Pacifico', cursive; color: #ff0080;
            white-space: nowrap; font-size: 1.5rem; pointer-events: none;
            text-shadow: 0 0 10px #fff; backface-visibility: visible;
        }

        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="margin-top:0">Universe Login</h2>
            <input type="text" id="username" placeholder="Full Name..." autocomplete="off">
            <button onmousedown="checkLogin()">Enter Orbit</button>
        </div>
    </div>

    <div id="main-content">
        <div id="star-field"></div>
        <div class="planet"></div>
        <div id="scene-root"></div>
    </div>

    <script>
        // FORCING THE BUTTON TO BE READY IMMEDIATELY
        function checkLogin() {
            var val = document.getElementById('username').value.trim();
            if(val === "Kyal Sin Ko Ko") {
                startUniverse();
            } else {
                alert("Incorrect Name. Make sure it is exactly Kyal Sin Ko Ko");
            }
        }

        var rotY = 0; var rotX = -10;
        var isDown = false; var lx, ly;

        function startUniverse() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';var root = document.getElementById('scene-root');
            
            // 1. GENERATE 172 IMAGES
            for (var i = 1; i <= 172; i++) {
                var card = document.createElement('div');
                card.className = 'photo-card';
                
                var phi = Math.acos(-1 + (2 * i) / 172);
                var theta = Math.sqrt(172 * Math.PI) * phi;
                var r = 320 + (Math.random() * 80);

                var x = r * Math.sin(phi) * Math.cos(theta);
                var y = r * Math.sin(phi) * Math.sin(theta);
                var z = r * Math.cos(phi);

                card.style.transform = "translate3d("+x+"px, "+y+"px, "+z+"px)";
                card.innerHTML = '<img src="images/1 ('+i+').jpg" onerror="this.src=\'https://via.placeholder.com/100/ff0080/ffffff?text='+i+'\'">';
                root.appendChild(card);
            }

            // 2. GENERATE MANY TEXT RINGS
            var textPhrases = 15;
            for (var j = 0; j < textPhrases; j++) {
                var t = document.createElement('div');
                t.className = 'orbit-text';
                t.innerText = "I love Kyal Sin Ko Ko";
                
                var angle = (j / textPhrases) * Math.PI * 2;
                var tx = Math.cos(angle) * 450;
                var tz = Math.sin(angle) * 450;
                var ty = (Math.random() - 0.5) * 600;

                t.style.transform = "translate3d("+tx+"px, "+ty+"px, "+tz+"px) rotateY("+(-angle)+"rad)";
                root.appendChild(t);
            }

            createStars();
            setupRotation();
            draw();
        }

        function createStars() {
            var f = document.getElementById('star-field');
            for (var i = 0; i < 150; i++) {
                var s = document.createElement('div');
                s.className = 'star';
                var size = Math.random() * 3 + 'px';
                s.style.width = size; s.style.height = size;
                s.style.top = Math.random() * 100 + 'vh';
                s.style.left = Math.random() * 100 + 'vw';
                f.appendChild(s);
            }
        }

        function setupRotation() {
            var move = function(x, y) {
                if(!isDown) return;
                rotY += (x - lx) * 0.4;
                rotX -= (y - ly) * 0.4;
                lx = x; ly = y;
            };
            window.onmousedown = function(e){ isDown=true; lx=e.clientX; ly=e.clientY; };
            window.ontouchstart = function(e){ isDown=true; lx=e.touches[0].clientX; ly=e.touches[0].clientY; };
            window.onmousemove = function(e){ move(e.clientX, e.clientY); };
            window.ontouchmove = function(e){ move(e.touches[0].clientX, e.touches[0].clientY); };
            window.onmouseup = window.ontouchend = function(){ isDown=false; };
        }

        function draw() {
            if(!isDown) rotY += 0.15; // Auto-drift
            document.getElementById('scene-root').style.transform = "rotateX("+rotX+"deg) rotateY("+rotY+"deg)";
            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
