<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universe</title>
    <script>
        function go() {
            console.log("Button Clicked");
            document.getElementById('login').style.display = 'none';
            document.getElementById('universe').style.display = 'block';
            start();
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; color: white; font-family: sans-serif; }
        
        #login {
            position: fixed; inset: 0; background: radial-gradient(circle, #2b001a, #000);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
        }
        .box { background: rgba(255, 255, 255, 0.07); padding: 40px; border-radius: 30px; backdrop-filter: blur(20px); border: 1px solid rgba(255, 105, 180, 0.3); text-align: center; width: 280px; }
        h1 { font-family: 'Pacifico', cursive; font-size: 2.5rem; margin-bottom: 20px; }
        
        /* THE "UNBREAKABLE" BUTTON */
        #btn { 
            width: 100%; padding: 20px; border-radius: 50px; border: none; 
            background: #ff1493; color: white; font-size: 1.5rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 0 30px #ff1493;
        }

        #universe { display: none; width: 100%; height: 100vh; perspective: 1000px; touch-action: none; }
        #scaler { width: 100%; height: 100%; transform-style: preserve-3d; }
        #scene { position: absolute; top: 50%; left: 50%; transform-style: preserve-3d; }

        /* THE PLANET */
        .planet {
            position: absolute; width: 150px; height: 150px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff69b4, #ff1493, #000);
            transform: translate(-50%, -50%); box-shadow: 0 0 60px #ff1493;
            display: flex; justify-content: center; align-items: center; z-index: 10;
        }
        .planet::after { content: '❤️'; font-size: 4rem; }

        /* CARDS */
        .card { position: absolute; width: 80px; height: 80px; background: #fff; border: 2px solid #fff; border-radius: 5px; overflow: hidden; backface-visibility: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .txt { position: absolute; font-family: 'Pacifico', cursive; color: #fff; white-space: nowrap; font-size: 1.6rem; text-shadow: 0 0 15px #ff1493; }
        .star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="login">
        <div class="box">
            <h1>Welcome</h1>
            <p style="margin-bottom: 20px;">Click the button below</p>
            <button id="btn" onclick="go()">ENTER ORBIT</button>
        </div>
    </div>

    <div id="universe">
        <div id="scaler">
            <div id="scene">
                <div class="planet"></div>
            </div>
        </div>
    </div>

    <script>
        let z = 1, rx = -10, ry = 0, isD = false, lx, ly, pD = 0;

        function start() {
            const sc = document.getElementById('scene');
            // Stars
            for(let i=0; i<150; i++) {
                let s = document.createElement('div');
                s.className = 'star';
                let r = 250 + Math.random()*800;
                let ph = Math.random()*Math.PI*2, th = Math.random()*Math.PI;
                s.style.width = s.style.height = Math.random()*3+'px';
                s.style.transform = translate3d(${r*Math.sin(th)*Math.cos(ph)}px, ${r*Math.sin(th)*Math.sin(ph)}px, ${r*Math.cos(th)}px);sc.appendChild(s);
            }
            // 172 Cards
            for(let i=1; i<=172; i++) {
                let c = document.createElement('div');
                c.className = 'card';
                let a = (i/172)*Math.PI*2;
                let r = 400;
                let y = (Math.random()-0.5)*500;
                c.style.transform = translate3d(${Math.cos(a)*r}px, ${y}px, ${Math.sin(a)*r}px) rotateY(${-a}rad);
                c.innerHTML = <img src="1 (${i}).jpg" onerror="this.src='https://via.placeholder.com/100/ff1493/ffffff?text=❤️'">;
                sc.appendChild(c);
            }
            // Love Text
            for(let t=0; t<8; t++) {
                let x = document.createElement('div');
                x.className = 'txt';
                x.innerText = "I love Kyal Sin Ko Ko";
                let a = (t/8)*Math.PI*2;
                x.style.transform = translate3d(${Math.cos(a)*500}px, ${(t-4)*60}px, ${Math.sin(a)*500}px) rotateY(${-a}rad);
                sc.appendChild(x);
            }
            init();
            loop();
        }

        function init() {
            window.ontouchstart = e => {
                if(e.touches.length === 2) pD = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                else { isD = true; lx = e.touches[0].clientX; ly = e.touches[0].clientY; }
            };
            window.ontouchmove = e => {
                if(e.touches.length === 2) {
                    let d = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                    z *= (d/pD); z = Math.max(0.2, Math.min(z, 3)); pD = d;
                } else if(isD) {
                    ry += (e.touches[0].clientX - lx)*0.5; rx -= (e.touches[0].clientY - ly)*0.5;
                    lx = e.touches[0].clientX; ly = e.touches[0].clientY;
                }
            };
            window.ontouchend = () => isD = false;
        }

        function loop() {
            if(!isD) ry += 0.15;
            document.getElementById('scene').style.transform = rotateX(${rx}deg) rotateY(${ry}deg);
            document.getElementById('scaler').style.transform = scale(${z});
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
