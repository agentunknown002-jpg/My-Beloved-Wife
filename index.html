<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    
    <script>
        function checkName() {
            const input = document.getElementById('nameInput');
            const name = input.value.trim().toLowerCase();
            
            // This checks for the name without being picky about spaces
            if (name.replace(/\s/g, "") === "kyalsinkoko") {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('universe').style.display = 'block';
                startGalaxy();
            } else {
                alert("Please enter the correct name, my love.");
            }
        }
    </script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        
        /* LOGIN */
        #gate { position: fixed; inset: 0; background: radial-gradient(circle, #2b001a, #000); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-box { text-align: center; width: 280px; padding: 30px; background: rgba(255,255,255,0.05); border-radius: 30px; backdrop-filter: blur(10px); border: 1px solid rgba(255,20,147,0.3); }
        h1 { font-family: 'Pacifico', cursive; color: #ff69b4; font-size: 2rem; margin-bottom: 20px; }
        
        input { width: 100%; padding: 15px; border-radius: 25px; border: 1px solid #ff1493; background: #000; color: #fff; text-align: center; margin-bottom: 20px; outline: none; box-sizing: border-box; }
        
        /* THE BUTTON */
        #start-btn { 
            background: #ff1493; color: white; border: none; padding: 18px; width: 100%;
            border-radius: 50px; font-size: 1.1rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 20, 147, 0.4);
        }

        /* UNIVERSE */
        #universe { display: none; width: 100%; height: 100vh; perspective: 1000px; }
        #scene { position: absolute; top: 50%; left: 50%; transform-style: preserve-3d; }

        .planet {
            position: absolute; width: 150px; height: 150px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff85c1, #ff1493, #000);
            transform: translate(-50%, -50%); box-shadow: 0 0 60px #ff1493;
            display: flex; justify-content: center; align-items: center;
        }
        .planet::after { content: '❤️'; font-size: 3.5rem; }

        .card { position: absolute; width: 80px; height: 80px; background: #fff; border-radius: 4px; opacity: 0; transition: opacity 1s; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="gate">
        <div class="login-box">
            <h1>Universe</h1>
            <input type="text" id="nameInput" placeholder="Enter Name">
            <button id="start-btn" onclick="checkName()">ENTER ORBIT</button>
        </div>
    </div>

    <div id="universe">
        <div id="scene">
            <div class="planet"></div>
        </div>
    </div>

    <script>
        let ry = 0;
        function startGalaxy() {
            const sc = document.getElementById('scene');
            // Stars
            for(let i=0; i<100; i++) {
                let s = document.createElement('div');
                s.className = 'star';
                let r = 200 + Math.random()*700;
                let p = Math.random()*Math.PI*2, t = Math.random()*Math.PI;s.style.width = s.style.height = '2px';
                s.style.transform = translate3d(${r*Math.sin(t)*Math.cos(p)}px, ${r*Math.sin(t)*Math.sin(p)}px, ${r*Math.cos(t)}px);
                sc.appendChild(s);
            }
            // Photos (Optimized loading)
            let idx = 1;
            function addOne() {
                if(idx > 172) return;
                let c = document.createElement('div');
                c.className = 'card';
                let a = (idx/172)*Math.PI*2;
                let r = 380;
                c.style.transform = translate3d(${Math.cos(a)*r}px, ${(Math.random()-0.5)*500}px, ${Math.sin(a)*r}px) rotateY(${-a}rad);
                c.innerHTML = <img src="1 (${idx}).jpg" onerror="this.parentElement.remove()">;
                sc.appendChild(c);
                setTimeout(() => c.style.opacity = 1, 10);
                idx++;
                setTimeout(addOne, 50);
            }
            addOne();
            loop();
        }

        function loop() {
            ry += 0.15;
            document.getElementById('scene').style.transform = rotateY(${ry}deg) rotateX(-10deg);
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
