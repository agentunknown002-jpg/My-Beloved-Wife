<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universe | Kyal Sin Ko Ko</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        /* Perspective increased for deep view */
        #universe { width: 100%; height: 100vh; perspective: 2500px; background: radial-gradient(circle at center, #2b0016 0%, #000 100%); }
        
        #zoom-layer { width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.15s ease-out; }
        #scene { position: absolute; top: 50%; left: 50%; transform-style: preserve-3d; will-change: transform; }

        .card { 
            position: absolute; width: 80px; height: 80px; background: white; 
            padding: 2px; border-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); 
            will-change: transform; backface-visibility: hidden;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; border-radius: 2px; }
        
        /* STAR PARTICLES - Density increased */
        .star { position: absolute; background: #fff; border-radius: 50%; pointer-events: none; will-change: transform; }
        .heart-star { position: absolute; background: #ff1493; border-radius: 50%; box-shadow: 0 0 10px #ff69b4; pointer-events: none; }
        
        #msg { 
            position: absolute; transform-style: preserve-3d; color: #ff69b4; 
            text-align: center; font-weight: bold; font-size: 1.3rem; width: 320px;
            text-shadow: 0 0 15px rgba(255, 20, 147, 0.8); pointer-events: none;
            line-height: 1.4;
        }
    </style>
</head>
<body onclick="playMusic()">

    <audio id="bgMusic" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div id="universe">
        <div id="zoom-layer">
            <div id="scene">
                <div id="msg">I love you more than anything<br>Kyal Sin Ko Ko</div>
            </div>
        </div>
    </div>

    <script>
        var scene = document.getElementById('scene');
        var zoomLayer = document.getElementById('zoom-layer');
        
        var ry = 0, rx = -10, zoom = -1000; // Starting further out to see the density
        var isDragging = false, lastX, lastY, lastDist = 0;
        var allItems = [];

        function playMusic() {
            var audio = document.getElementById('bgMusic');
            audio.play().catch(function(e) {});
        }

        for (var i = 0; i < 220; i++) {
            var t = (i / 220) * Math.PI * 2;
            var cs = document.createElement('div');
            cs.className = 'heart-star';
            var scale = 7; 
            var cx = 16 * Math.pow(Math.sin(t), 3) * scale;
            var cy = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * scale;
            var cz = (Math.random() - 0.5) * 30; 
            cs.style.width = cs.style.height = (Math.random() * 3 + 2) + 'px';
            scene.appendChild(cs);
            allItems.push({ el: cs, x: cx, y: cy, z: cz });
        }
