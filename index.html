<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        
        /* THE GATE - SIMPLE & BOLD */
        #gate {
            position: fixed; inset: 0; background: radial-gradient(circle, #2b001a, #000);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .box { text-align: center; width: 80%; max-width: 300px; }
        h1 { font-family: 'Pacifico', cursive; font-size: 2.5rem; margin-bottom: 30px; color: #ff69b4; }
        
        /* NEW BUTTON STYLE */
        #enter-btn { 
            background: #ff1493; color: white; border: none; padding: 20px 0; width: 100%;
            border-radius: 50px; font-size: 1.4rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 20, 147, 0.4);
        }

        /* GALAXY SETUP */
        #universe { display: none; width: 100%; height: 100vh; perspective: 1000px; touch-action: none; }
        #scene { position: absolute; top: 50%; left: 50%; transform-style: preserve-3d; }

        .planet {
            position: absolute; width: 160px; height: 160px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff85c1, #ff1493, #000);
            transform: translate(-50%, -50%); box-shadow: 0 0 80px #ff1493;
            display: flex; justify-content: center; align-items: center;
        }
        .planet::after { content: '❤️'; font-size: 4rem; }

        .card { position: absolute; width: 80px; height: 80px; background: #fff; border: 2px solid #fff; border-radius: 4px; overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="gate">
        <div class="box">
            <h1>Universe</h1>
            <button id="enter-btn">ENTER ORBIT</button>
        </div>
    </div>

    <div id="universe">
        <div id="scene">
            <div class="planet"></div>
        </div>
    </div>

    <script>
        // Use an event listener instead of 'onclick' attribute - more reliable on mobile
        document.getElementById('enter-btn').addEventListener('click', function() {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('universe').style.display = 'block';
            launch();
        });

        let ry = 0;
        function launch() {
            const sc = document.getElementById('scene');
            
            // 1. Stars
            for(let i=0; i<100; i++) {
                let s = document.createElement('div');
                s.className = 'star';
                let r = 200 + Math.random()*800;
                let p = Math.random()*Math.PI*2, t = Math.random()*Math.PI;
                s.style.width = s.style.height = '2px';
                s.style.transform = translate3d(${r*Math.sin(t)*Math.cos(p)}px, ${r*Math.sin(t)*Math.sin(p)}px, ${r*Math.cos(t)}px);
                sc.appendChild(s);
            }

            // 2. Photos (Spawned slower to prevent crash)
            let count = 1;
            function addPhoto() {
                if(count > 172) return;
                let c = document.createElement('div');
                c.className = 'card';
                let a = (count/172)*Math.PI*2;
                let r = 400;
                let y = (Math.random()-0.5)*500;c.style.transform = translate3d(${Math.cos(a)*r}px, ${y}px, ${Math.sin(a)*r}px) rotateY(${-a}rad);
                c.innerHTML = <img src="1 (${count}).jpg" onerror="this.parentElement.style.display='none'">;
                sc.appendChild(c);
                count++;
                setTimeout(addPhoto, 20); // Adds one every 20ms
            }
            addPhoto();
            loop();
        }

        function loop() {
            ry += 0.15;
            document.getElementById('scene').style.transform = rotateY(${ry}deg) rotateX(-10deg);
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
